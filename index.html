// 🌈 NYAN CAT
// ════════════════════════════════════════════════
function wNyan(ct){
  const{canvas:c,ctx,W,H,kill}=makeCanvas(ct);
  let t=0,stars=[],loop;
  for(let i=0;i<60;i++)stars.push({x:Math.random()*1200,y:Math.random()*800,s:1+Math.random()*3,spd:2+Math.random()*4});
  const rainbow=['#ff0000','#ff8800','#ffff00','#00ff00','#0088ff','#8800ff'];
  function draw(){
    const w=W(),h=H();
    ctx.fillStyle='#0a0a2a';ctx.fillRect(0,0,w,h);
    t++;
    // stars
    stars.forEach(s=>{
      s.x-=s.spd;if(s.x<-10)s.x=w+10;
      const twinkle=Math.sin(t*.1+s.y)>.3;
      if(twinkle){ctx.fillStyle='#fff';ctx.fillRect(s.x-s.s,s.y,s.s*2+1,1);ctx.fillRect(s.x,s.y-s.s,1,s.s*2+1)}
    });
    const catX=w*.35,catY=h/2+Math.sin(t*.15)*20;
    // rainbow trail
    for(let i=0;i<6;i++){
      ctx.fillStyle=rainbow[i];
      const ry=catY-15+i*8;
      for(let x=0;x<catX-20;x+=12){
        const wave=Math.sin((x+t*4)*.05)*4;
        ctx.fillRect(x,ry+wave,14,7);
      }
    }
    // pop tart body
    ctx.fillStyle='#f5c07a';ctx.beginPath();ctx.roundRect(catX-28,catY-22,56,44,6);ctx.fill();
    // frosting
    ctx.fillStyle='#ff88aa';ctx.beginPath();ctx.roundRect(catX-22,catY-18,44,36,4);ctx.fill();
    // sprinkles
    const sprinkleColors=['#ff4444','#44ff44','#4444ff','#ffff44','#ff44ff'];
    for(let i=0;i<8;i++){
      ctx.fillStyle=sprinkleColors[i%sprinkleColors.length];
      const sx=catX-16+((i*7+Math.sin(i*3)*4)%36),sy=catY-12+((i*9)%28);
      ctx.fillRect(sx,sy,3,3);
    }
    // cat face
    ctx.fillStyle='#888';
    // ears
    ctx.beginPath();ctx.moveTo(catX-24,catY-22);ctx.lineTo(catX-18,catY-34);ctx.lineTo(catX-12,catY-22);ctx.fill();
    ctx.beginPath();ctx.moveTo(catX+12,catY-22);ctx.lineTo(catX+18,catY-34);ctx.lineTo(catX+24,catY-22);ctx.fill();
    // head
    ctx.fillRect(catX-26,catY-8,8,18);// left cheek
    ctx.fillRect(catX+18,catY-8,8,18);// right cheek
    // feet
    ctx.fillRect(catX-26,catY+22,10,8);ctx.fillRect(catX+16,catY+22,10,8);
    // tail
    const tailWag=Math.sin(t*.3)*8;
    ctx.fillRect(catX+28,catY+tailWag,14,6);
    // eyes
    ctx.fillStyle='#000';
    ctx.fillRect(catX-20,catY-2,4,4);ctx.fillRect(catX+16,catY-2,4,4);
    // mouth
    ctx.fillStyle='#ff6688';ctx.fillRect(catX-4,catY+6,8,3);
    // cheeks
    ctx.fillStyle='rgba(255,100,100,.3)';ctx.beginPath();ctx.arc(catX-20,catY+6,5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(catX+20,catY+6,5,0,Math.PI*2);ctx.fill();
    // score text
    ctx.fillStyle='#fff';ctx.font='bold 16px JetBrains Mono';ctx.textAlign='center';
    ctx.fillText('NYAN '.repeat(8),w/2,h-20);
    loop=requestAnimationFrame(draw);
  }
  draw();return()=>{cancelAnimationFrame(loop);kill()};
}

// ════════════════════════════════════════════════
// 🕺 STICK DANCE
// ════════════════════════════════════════════════
function wStickDance(ct){
  const{canvas:c,ctx,W,H,kill}=makeCanvas(ct);
  let t=0,loop,beat=0;
  const danceColors=['#fbbf24','#f87171','#4ade80','#60a5fa','#a78bfa','#f472b6'];
  function drawStick(cx,cy,scale,phase){
    const s=scale;ctx.strokeStyle=danceColors[Math.floor(t/20)%danceColors.length];ctx.lineWidth=3*s;ctx.lineCap='round';
    // head
    ctx.beginPath();ctx.arc(cx,cy-50*s,12*s,0,Math.PI*2);ctx.stroke();
    // body
    ctx.beginPath();ctx.moveTo(cx,cy-38*s);ctx.lineTo(cx,cy+10*s);ctx.stroke();
    // legs
    const legAngle=Math.sin(t*.12+phase)*.6;
    ctx.beginPath();ctx.moveTo(cx,cy+10*s);ctx.lineTo(cx+Math.sin(legAngle)*30*s,cy+50*s);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx,cy+10*s);ctx.lineTo(cx-Math.sin(legAngle)*30*s,cy+50*s);ctx.stroke();
    // arms - different dance moves based on beat
    const move=Math.floor(t/40)%4;
    const armPhase=t*.15+phase;
    if(move===0){// disco point
      ctx.beginPath();ctx.moveTo(cx,cy-25*s);ctx.lineTo(cx+Math.cos(armPhase)*35*s,cy-25*s+Math.sin(armPhase)*-30*s);ctx.stroke();
      ctx.beginPath();ctx.moveTo(cx,cy-25*s);ctx.lineTo(cx-20*s,cy-5*s);ctx.stroke();
    }else if(move===1){// wave
      ctx.beginPath();ctx.moveTo(cx,cy-25*s);ctx.lineTo(cx+35*s,cy-45*s+Math.sin(armPhase)*15*s);ctx.stroke();
      ctx.beginPath();ctx.moveTo(cx,cy-25*s);ctx.lineTo(cx-35*s,cy-45*s+Math.sin(armPhase+1)*15*s);ctx.stroke();
    }else if(move===2){// robot
      const arm=Math.sin(armPhase)>.5?1:-1;
      ctx.beginPath();ctx.moveTo(cx,cy-25*s);ctx.lineTo(cx+30*s*arm,cy-25*s);ctx.lineTo(cx+30*s*arm,cy-55*s);ctx.stroke();
      ctx.beginPath();ctx.moveTo(cx,cy-25*s);ctx.lineTo(cx-30*s*arm,cy-25*s);ctx.lineTo(cx-30*s*arm,cy);ctx.stroke();
    }else{// macarena
      ctx.beginPath();ctx.moveTo(cx,cy-25*s);ctx.lineTo(cx+35*s,cy-15*s+Math.sin(armPhase)*10*s);ctx.stroke();
      ctx.beginPath();ctx.moveTo(cx,cy-25*s);ctx.lineTo(cx-35*s,cy-15*s+Math.cos(armPhase)*10*s);ctx.stroke();
    }
  }
  function draw(){
    const w=W(),h=H();
    ctx.fillStyle='#06080f';ctx.fillRect(0,0,w,h);
    t++;
    // disco floor
    const floorY=h*.7;
    for(let i=0;i<8;i++)for(let j=0;j<4;j++){
      const hue=(i*45+j*90+t*3)%360;
      ctx.fillStyle=`hsla(${hue},70%,40%,.15)`;
      ctx.fillRect(i*w/8,floorY+j*((h-floorY)/4),w/8,((h-floorY)/4));
    }
    // disco ball
    ctx.fillStyle='#aaa';ctx.beginPath();ctx.arc(w/2,40,20,0,Math.PI*2);ctx.fill();
    for(let i=0;i<8;i++){
      const a=t*.05+i*Math.PI/4,r=20;
      ctx.fillStyle=`hsla(${i*45+t*5},80%,80%,.3)`;
      ctx.beginPath();ctx.arc(w/2+Math.cos(a)*r,40+Math.sin(a)*r,3,0,Math.PI*2);ctx.fill();
    }
    // light beams
    ctx.globalAlpha=.06;
    for(let i=0;i<5;i++){
      const a=Math.sin(t*.02+i*1.3)*.8;
      ctx.fillStyle=danceColors[i%danceColors.length];
      ctx.beginPath();ctx.moveTo(w/2,40);ctx.lineTo(w/2+Math.sin(a)*w*.6,h);ctx.lineTo(w/2+Math.sin(a)*w*.6+80,h);ctx.closePath();ctx.fill();
    }
    ctx.globalAlpha=1;
    // dancers
    const numDancers=5;
    for(let i=0;i<numDancers;i++){
      const dx=w*(i+1)/(numDancers+1),dy=floorY-20;
      const sc=.8+Math.sin(i*2)*.2;
      drawStick(dx,dy,sc,i*2);
    }
    // text
    ctx.fillStyle='#fbbf24';ctx.font='bold 20px Outfit';ctx.textAlign='center';
    const moves=['DISCO','WAVE','ROBOT','MACARENA'];
    ctx.fillText('💃 '+moves[Math.floor(t/40)%4]+' 🕺',w/2,h-16);
    loop=requestAnimationFrame(draw);
  }
  draw();return()=>{cancelAnimationFrame(loop);kill()};
}

// ════════════════════════════════════════════════
// 🐠 FISH TANK
// ════════════════════════════════════════════════
function wAquarium(ct){
  const{canvas:c,ctx,W,H,kill}=makeCanvas(ct);
  let t=0,loop;
  const fish=[];const bubbles=[];
  const fishColors=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff922b','#cc5de8','#20c997','#ff8787'];
  for(let i=0;i<12;i++){
    fish.push({
      x:Math.random()*800,y:50+Math.random()*400,
      size:12+Math.random()*20,
      speed:(1+Math.random()*2)*(Math.random()>.5?1:-1),
      color:fishColors[i%fishColors.length],
      wiggle:Math.random()*10,
      yOff:Math.random()*1000
    });
  }
  function draw(){
    const w=W(),h=H();t++;
    // water gradient
    const wg=ctx.createLinearGradient(0,0,0,h);
    wg.addColorStop(0,'#0a2463');wg.addColorStop(.4,'#0d3b66');wg.addColorStop(1,'#051e3e');
    ctx.fillStyle=wg;ctx.fillRect(0,0,w,h);
    // light rays
    ctx.globalAlpha=.03;
    for(let i=0;i<4;i++){
      const rx=w*.2+i*w*.2+Math.sin(t*.005+i)*40;
      ctx.fillStyle='#88ccff';ctx.beginPath();ctx.moveTo(rx,0);ctx.lineTo(rx-60,h);ctx.lineTo(rx+60,h);ctx.closePath();ctx.fill();
    }
    ctx.globalAlpha=1;
    // sand
    ctx.fillStyle='#c4a35a';ctx.beginPath();
    ctx.moveTo(0,h-30);
    for(let x=0;x<=w;x+=20)ctx.lineTo(x,h-30+Math.sin(x*.03)*6);
    ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.closePath();ctx.fill();
    // seaweed
    for(let i=0;i<6;i++){
      const sx=w*(i+1)/7;
      ctx.strokeStyle=i%2?'#2d6a4f':'#40916c';ctx.lineWidth=4;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(sx,h-30);
      for(let y=h-30;y>h-30-60-i*15;y-=5){
        const wave=Math.sin(y*.03+t*.04+i)*12;
        ctx.lineTo(sx+wave,y);
      }ctx.stroke();
    }
    // bubbles
    if(Math.random()<.08)bubbles.push({x:Math.random()*w,y:h-30,r:1+Math.random()*4,spd:.5+Math.random()*1.5});
    bubbles.forEach(b=>{b.y-=b.spd;b.x+=Math.sin(b.y*.02)*.5;
      ctx.strokeStyle='rgba(150,210,255,.3)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.stroke();
    });
    for(let i=bubbles.length-1;i>=0;i--)if(bubbles[i].y<-10)bubbles.splice(i,1);
    // fish
    fish.forEach(f=>{
      f.x+=f.speed;
      if(f.x>w+50)f.x=-50;if(f.x<-50)f.x=w+50;
      const fy=f.y+Math.sin(t*.02+f.yOff)*15;
      const dir=f.speed>0?1:-1;
      const tailWag=Math.sin(t*.15+f.wiggle)*6;
      ctx.save();ctx.translate(f.x,fy);ctx.scale(dir,1);
      // body
      ctx.fillStyle=f.color;ctx.beginPath();ctx.ellipse(0,0,f.size,f.size*.55,0,0,Math.PI*2);ctx.fill();
      // tail
      ctx.beginPath();ctx.moveTo(-f.size*.8,0);ctx.lineTo(-f.size*1.3,tailWag-f.size*.4);ctx.lineTo(-f.size*1.3,tailWag+f.size*.4);ctx.closePath();ctx.fill();
      // eye
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(f.size*.35,-f.size*.1,f.size*.18,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#000';ctx.beginPath();ctx.arc(f.size*.4,-f.size*.1,f.size*.1,0,Math.PI*2);ctx.fill();
      // fin
      ctx.fillStyle=f.color+'aa';ctx.beginPath();ctx.ellipse(0,f.size*.3,f.size*.3,f.size*.15,-.2+Math.sin(t*.1+f.wiggle)*.2,0,Math.PI*2);ctx.fill();
      ctx.restore();
    });
    // surface ripple
    ctx.strokeStyle='rgba(150,210,255,.08)';ctx.lineWidth=2;
    ctx.beginPath();for(let x=0;x<=w;x+=4){ctx.lineTo(x,8+Math.sin(x*.02+t*.03)*3)}ctx.stroke();
    loop=requestAnimationFrame(draw);
  }
  draw();return()=>{cancelAnimationFrame(loop);kill()};
}
