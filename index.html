<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>SkyDeck</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#06080f;--surface:#0c1018;--elevated:#121824;--card:#141c2a;
  --accent:#fbbf24;--accent2:#f59e0b;--accent-dim:rgba(251,191,36,.12);
  --text:#f0ece4;--text2:#6b7a94;--text3:#3d4a60;
  --success:#34d399;--danger:#f87171;--info:#60a5fa;
  --glass:rgba(255,255,255,.04);--glass-border:rgba(255,255,255,.06);
  --r:20px;--r-sm:12px;
  --game-green:#22c55e;--game-red:#ef4444;--game-blue:#3b82f6;
  --game-purple:#a855f7;--game-orange:#f97316;--game-cyan:#06b6d4;
  --game-pink:#ec4899;--game-yellow:#eab308;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Outfit',system-ui,sans-serif}
#app{height:100%;display:flex;flex-direction:column;position:relative}

/* ── HOME ── */
#home{flex:1;overflow-y:auto;padding:0 16px 100px;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
.hero{padding:40px 0 24px;text-align:center;position:relative}
.hero::before{content:'';position:absolute;top:-40px;left:50%;transform:translateX(-50%);width:300px;height:200px;background:radial-gradient(ellipse,rgba(251,191,36,.08),transparent 70%);pointer-events:none}
.hero h1{font-size:38px;font-weight:900;letter-spacing:-1px;color:#fbbf24;background:linear-gradient(135deg,#fbbf24 0%,#f59e0b 40%,#fcd34d 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{color:var(--text2);font-size:13px;margin-top:6px;font-weight:400;letter-spacing:.5px}
.cat-label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin:28px 0 14px 4px;display:flex;align-items:center;gap:8px}
.cat-label::after{content:'';flex:1;height:1px;background:var(--glass-border)}
.cat-label.games{color:#fbbf24}.cat-label.fidget{color:#34d399}.cat-label.watch{color:#a78bfa}.cat-label.create{color:#f472b6}
.cards{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.card{position:relative;border-radius:var(--r);padding:20px 16px;cursor:pointer;overflow:hidden;border:1px solid var(--glass-border);transition:transform .15s ease,box-shadow .2s ease;min-height:100px}
.card::before{content:'';position:absolute;inset:0;opacity:.6;z-index:0;transition:opacity .2s}
.card:active{transform:scale(.96)}
.card:hover{box-shadow:0 8px 32px rgba(0,0,0,.4)}
.card>*{position:relative;z-index:1}
.card-ic{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;flex-shrink:0;box-shadow:0 4px 12px rgba(0,0,0,.25)}
.card-ic svg{width:26px;height:26px}
.card .name{font-weight:700;font-size:14px;letter-spacing:-.2px;margin-bottom:3px}
.card .desc{font-size:11px;color:rgba(240,236,228,.5);font-weight:400;line-height:1.35}
.card.games-card::before{background:linear-gradient(135deg,rgba(251,191,36,.1),rgba(245,158,11,.05))}
.card.games-card{border-color:rgba(251,191,36,.1)}
.card.fidget-card::before{background:linear-gradient(135deg,rgba(52,211,153,.1),rgba(16,185,129,.05))}
.card.fidget-card{border-color:rgba(52,211,153,.1)}
.card.watch-card::before{background:linear-gradient(135deg,rgba(167,139,250,.1),rgba(139,92,246,.05))}
.card.watch-card{border-color:rgba(167,139,250,.1)}
.card.create-card::before{background:linear-gradient(135deg,rgba(244,114,182,.1),rgba(236,72,153,.05))}
.card.create-card{border-color:rgba(244,114,182,.1)}

/* ── ACTIVITY ── */
#activity{position:absolute;inset:0;background:var(--bg);z-index:10;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);pointer-events:none}
#activity.open{transform:translateX(0);pointer-events:all}
#act-bar{display:flex;align-items:center;gap:12px;padding:10px 16px;flex-shrink:0;background:rgba(6,8,15,.9);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--glass-border);z-index:2}
#back-btn{width:38px;height:38px;border-radius:var(--r-sm);border:1px solid var(--glass-border);background:var(--glass);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
#back-btn:active{background:rgba(255,255,255,.1)}
#act-name{font-weight:700;font-size:17px;flex:1;letter-spacing:-.2px}
#act-score{font-family:'JetBrains Mono',monospace;font-size:15px;color:var(--accent);font-weight:600}
#act-body{flex:1;overflow:hidden;position:relative;display:flex;flex-direction:column}
#act-body canvas{display:block;touch-action:none}

/* ── TAB BAR ── */
#tabs{display:flex;background:rgba(6,8,15,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--glass-border);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom);z-index:20}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 8px;cursor:pointer;color:var(--text3);transition:color .2s;border:none;background:none;font-family:'Outfit',sans-serif;font-size:10px;font-weight:500;gap:2px;letter-spacing:.3px}
.tab.active{color:var(--accent)}
.tab span{font-size:20px;transition:transform .2s}
.tab.active span{transform:scale(1.15)}

/* ── GAME UI ── */
.overlay{position:absolute;inset:0;background:rgba(6,8,15,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:5;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.overlay h2{font-size:32px;font-weight:800;letter-spacing:-1px}
.overlay .sub{font-size:18px;color:var(--accent);margin:6px 0 24px;font-weight:600;font-family:'JetBrains Mono',monospace}
.btn{padding:14px 36px;border-radius:var(--r-sm);border:none;background:var(--accent);color:#000;font-family:'Outfit',sans-serif;font-weight:700;font-size:15px;cursor:pointer;transition:transform .12s,box-shadow .2s;letter-spacing:-.2px}
.btn:active{transform:scale(.95)}
.btn:hover{box-shadow:0 4px 20px rgba(251,191,36,.3)}
.btn-sm{padding:8px 18px;font-size:13px;border-radius:10px}
.btn-ghost{background:var(--glass);color:var(--text);border:1px solid var(--glass-border)}
.hud{display:flex;justify-content:space-between;padding:8px 16px;font-size:13px;color:var(--text2);flex-shrink:0;font-weight:600}
.hud b{color:var(--text)}

/* ── 2048 ── */
.g2048{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:8px;background:var(--surface);border-radius:var(--r);max-width:380px;margin:16px auto 0;width:calc(100% - 32px);aspect-ratio:1}
.t2048{border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:clamp(20px,6vw,34px);background:var(--elevated);color:var(--text2);transition:transform .1s;letter-spacing:-1px}
.t2048.pop{animation:tpop .2s ease-out}
@keyframes tpop{0%{transform:scale(0)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
.t2048[data-v="2"]{background:#1e3a5f;color:#7dd3fc}.t2048[data-v="4"]{background:#1a4040;color:#5eead4}
.t2048[data-v="8"]{background:#4a3520;color:#fbbf24}.t2048[data-v="16"]{background:#5c2d1a;color:#fb923c}
.t2048[data-v="32"]{background:#5c1a2a;color:#fb7185}.t2048[data-v="64"]{background:#6a1a1a;color:#f87171}
.t2048[data-v="128"]{background:#5a4a0a;color:#fde047}.t2048[data-v="256"]{background:#4a5a0a;color:#bef264}
.t2048[data-v="512"]{background:#1a5a2a;color:#4ade80}.t2048[data-v="1024"]{background:#2a1a5a;color:#c084fc}
.t2048[data-v="2048"]{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#000}

/* ── MEMORY ── */
.mem-g{display:grid;gap:8px;padding:16px;max-width:400px;margin:0 auto;width:100%;perspective:800px}
.mem-c{aspect-ratio:1;border-radius:var(--r-sm);background:var(--elevated);border:2px solid var(--glass-border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:clamp(22px,7vw,38px);transition:transform .25s,border-color .25s,background .25s}
.mem-c.flip{border-color:var(--accent);background:var(--accent-dim);transform:rotateY(180deg)}
.mem-c.match{border-color:var(--success);background:rgba(52,211,153,.1)}
.mem-c .face{opacity:0;transition:opacity .15s .1s;transform:scaleX(-1)}
.mem-c.flip .face,.mem-c.match .face{opacity:1}

/* ── MINESWEEPER ── */
.mine-g{display:grid;gap:2px;padding:8px;max-width:380px;margin:0 auto;width:100%}
.mine-c{aspect-ratio:1;border-radius:4px;background:var(--elevated);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:clamp(11px,3vw,16px);font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--text);transition:background .1s,transform .1s}
.mine-c:active{transform:scale(.9)}
.mine-c.rev{background:var(--surface);cursor:default}
.mine-c.boom{background:var(--danger)}
.mine-c.flag{background:rgba(251,191,36,.1)}
.m1{color:#60a5fa}.m2{color:#34d399}.m3{color:#f87171}.m4{color:#818cf8}
.m5{color:#a855f7}.m6{color:#06b6d4}.m7{color:#f97316}.m8{color:#e2e8f0}

/* ── SIMON ── */
.simon-b{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:300px;margin:20px auto;padding:16px}
.si-btn{aspect-ratio:1;border-radius:var(--r);border:none;cursor:pointer;opacity:.45;transition:opacity .15s,transform .12s,box-shadow .15s}
.si-btn.lit{opacity:1;transform:scale(1.06);box-shadow:0 0 40px currentColor}
.si-btn:active{transform:scale(.94)}
.si-btn.r{background:#ef4444;color:#ef4444}.si-btn.g{background:#22c55e;color:#22c55e}
.si-btn.b{background:#3b82f6;color:#3b82f6}.si-btn.y{background:#eab308;color:#eab308}

/* ── WHACK ── */
.wh-g{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:320px;margin:20px auto;padding:16px}
.wh-h{aspect-ratio:1;border-radius:50%;background:var(--surface);border:3px solid var(--elevated);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:clamp(28px,8vw,44px);transition:transform .08s,background .12s,border-color .12s}
.wh-h.up{border-color:var(--accent);background:var(--accent-dim);transform:scale(1.12)}
.wh-h.bonk{border-color:var(--game-red);background:rgba(248,113,113,.15);transform:scale(.95)}

/* ── FIDGET ── */
.bub-g{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;padding:16px;max-width:380px;margin:0 auto}
.bub{aspect-ratio:1;border-radius:50%;background:radial-gradient(circle at 35% 30%,rgba(255,255,255,.12),var(--elevated) 70%);border:1.5px solid rgba(255,255,255,.08);cursor:pointer;transition:transform .12s cubic-bezier(.4,0,.2,1),opacity .25s}
.bub.pop{transform:scale(.6);opacity:.2;border-color:transparent;background:var(--surface)}
.tog-g{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;padding:24px;max-width:340px;margin:0 auto}
.tog{width:52px;height:28px;border-radius:14px;background:var(--elevated);border:none;cursor:pointer;position:relative;transition:background .2s cubic-bezier(.4,0,.2,1)}
.tog::after{content:'';position:absolute;left:3px;top:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:transform .2s cubic-bezier(.4,0,.2,1);box-shadow:0 1px 4px rgba(0,0,0,.3)}
.tog.on::after{transform:translateX(23px)}
.sl-list{display:flex;flex-direction:column;gap:22px;padding:24px 28px;max-width:380px;margin:0 auto;width:100%}
.sl-row label{font-size:11px;color:var(--text2);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;display:block}
.sl-row input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;outline:none;cursor:pointer;background:#1a1f30}
.sl-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.3);background:#fff}

/* ── DRAW ── */
.draw-bar{display:flex;gap:6px;padding:8px 12px;flex-shrink:0;flex-wrap:wrap;align-items:center;background:var(--surface);border-bottom:1px solid var(--glass-border)}
.draw-bar button{padding:6px 12px;border-radius:8px;border:1px solid var(--glass-border);background:var(--glass);color:var(--text);font-size:12px;cursor:pointer;font-family:'Outfit',sans-serif;font-weight:600;transition:background .15s}
.draw-bar button.on{background:var(--accent);color:#000;border-color:var(--accent)}
.cdot{width:26px;height:26px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:border-color .15s,transform .1s}
.cdot.on{border-color:#fff;transform:scale(1.15)}

/* ── PIXEL ── */
.px-g{display:grid;gap:1px;background:rgba(255,255,255,.03);padding:1px;max-width:380px;margin:8px auto 0;width:calc(100% - 32px)}
.px-c{aspect-ratio:1;background:var(--elevated);cursor:pointer}
.px-pal{display:flex;gap:5px;padding:10px 16px;flex-wrap:wrap;justify-content:center;flex-shrink:0}

/* ── BEAT ── */
.beat-g{display:grid;gap:3px;padding:0 12px}
.beat-c{border-radius:5px;background:var(--elevated);border:none;cursor:pointer;transition:background .08s,transform .08s;aspect-ratio:1}
.beat-c.on{transform:scale(.88)}
.beat-c.pulse{box-shadow:inset 0 0 12px rgba(255,255,255,.15)}
.beat-bar{display:flex;gap:10px;padding:12px 16px;justify-content:center;flex-shrink:0}
.beat-bar button{padding:10px 24px;border-radius:var(--r-sm);border:1px solid var(--glass-border);background:var(--glass);color:var(--text);font-family:'Outfit',sans-serif;font-weight:700;cursor:pointer;transition:all .15s}
.beat-bar button.go{background:var(--accent);color:#000;border-color:var(--accent)}

/* ── REACTIONS ── */
.rz{flex:1;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .25s}
.rz.wait{background:#450a0a}.rz.go{background:#052e16}.rz.done{background:var(--surface)}.rz.early{background:#431407}

/* ── TIC TAC TOE ── */
.ttt-g{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:320px;margin:20px auto;padding:16px;aspect-ratio:1}
.ttt-c{border-radius:var(--r-sm);background:var(--elevated);border:2px solid var(--glass-border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:clamp(36px,12vw,64px);font-weight:800;transition:background .15s,border-color .15s,transform .1s}
.ttt-c:active{transform:scale(.94)}
.ttt-c.x{color:#60a5fa;border-color:rgba(96,165,250,.3)}.ttt-c.o{color:#f87171;border-color:rgba(248,113,113,.3)}
.ttt-c.win{background:var(--accent-dim);border-color:var(--accent)}

/* ── CHESS ── */
.chess-wrap{display:flex;flex-direction:column;align-items:center;padding:12px 8px;flex:1;overflow:auto}
.chess-board{display:grid;grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(8,1fr);max-width:min(380px,calc(100vw - 32px));width:100%;aspect-ratio:1;border-radius:10px;overflow:hidden;border:3px solid rgba(139,92,246,.3);box-shadow:0 8px 32px rgba(0,0,0,.4)}
.chess-sq{display:flex;align-items:center;justify-content:center;font-size:clamp(22px,5.8vw,38px);cursor:pointer;position:relative;transition:background .12s;user-select:none;line-height:1;overflow:hidden}
.chess-sq.wpc{color:#fff;text-shadow:0 0 2px rgba(0,0,0,.8),0 0 4px rgba(0,0,0,.5),1px 1px 0 rgba(0,0,0,.4),-1px -1px 0 rgba(0,0,0,.4),1px -1px 0 rgba(0,0,0,.4),-1px 1px 0 rgba(0,0,0,.4)}
.chess-sq.bpc{color:#1a1a1a;text-shadow:0 0 1px rgba(255,255,255,.3)}
.chess-sq.light{background:#f0d9b5}.chess-sq.dark{background:#b58863}
.chess-sq.sel{background:#f6f669 !important}
.chess-sq.move-dot::after{content:'';position:absolute;width:26%;height:26%;border-radius:50%;background:rgba(0,0,0,.2);box-shadow:0 0 4px rgba(0,0,0,.15)}
.chess-sq.last{background:rgba(205,210,106,.55) !important}
.chess-sq.check{background:radial-gradient(circle,rgba(255,0,0,.6),rgba(255,0,0,.2)) !important}
.chess-diff{display:flex;gap:6px;margin-bottom:10px}
.chess-diff button{padding:6px 14px;border-radius:8px;border:1px solid var(--glass-border);background:var(--glass);color:var(--text);font-family:'Outfit',sans-serif;font-weight:600;font-size:12px;cursor:pointer;transition:all .15s}
.chess-diff button.on{background:var(--accent);color:#000;border-color:var(--accent)}
.chess-info{margin-top:12px;font-size:14px;font-weight:600;color:var(--text2);text-align:center;min-height:20px}

/* ── D-PAD ── */
.dpad{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);z-index:8;display:grid;grid-template-columns:54px 54px 54px;grid-template-rows:54px 54px;gap:4px;opacity:.65;touch-action:none}
.dpad button{border:none;border-radius:12px;background:rgba(255,255,255,.1);color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);transition:background .1s}
.dpad button:active{background:rgba(255,255,255,.25)}
.dpad .dp-up{grid-column:2;grid-row:1}.dpad .dp-left{grid-column:1;grid-row:2}.dpad .dp-down{grid-column:2;grid-row:2}.dpad .dp-right{grid-column:3;grid-row:2}
.tpad{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);z-index:8;display:flex;gap:8px;opacity:.65;touch-action:none}
.tpad button{width:64px;height:50px;border:none;border-radius:12px;background:rgba(255,255,255,.1);color:#fff;font-size:13px;font-weight:700;font-family:'Outfit',sans-serif;cursor:pointer;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);transition:background .1s}
.tpad button:active{background:rgba(255,255,255,.25)}
@media(min-width:769px){.dpad,.tpad{display:none}}

/* ── UTIL ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.fadeUp{animation:fadeUp .35s ease-out both}
.shake{animation:shake .35s ease-out}

/* Scrollbar */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--text3);border-radius:2px}
</style>
</head>
<body>
<div id="app">
  <div id="home"></div>
  <div id="activity">
    <div id="act-bar">
      <button id="back-btn">←</button>
      <div id="act-name"></div>
      <div id="act-score"></div>
    </div>
    <div id="act-body"></div>
  </div>
  <nav id="tabs"></nav>
</div>
<script>
// ════════════════════════════════════════════════
// AUDIO
// ════════════════════════════════════════════════
const A={
  _c:null,c(){if(!this._c)this._c=new(window.AudioContext||window.webkitAudioContext)();return this._c},
  t(f,d=.08,tp='sine',v=.12){try{const c=this.c(),o=c.createOscillator(),g=c.createGain();o.type=tp;o.frequency.value=f;g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+d)}catch(e){}},
  pop(){this.t(880,.06,'sine',.1)},
  hit(){this.t(180,.12,'square',.15)},
  click(){this.t(650,.03,'square',.06)},
  win(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>this.t(f,.25,'sine',.1),i*100))},
  lose(){[400,320,240,180].forEach((f,i)=>setTimeout(()=>this.t(f,.2,'sawtooth',.08),i*120))},
  flap(){this.t(500,.04,'sine',.06)},
  drum(type){
    const c=this.c(),t=c.currentTime;
    if(type==='kick'){const o=c.createOscillator(),g=c.createGain();o.frequency.setValueAtTime(150,t);o.frequency.exponentialRampToValueAtTime(1,t+.4);g.gain.setValueAtTime(.6,t);g.gain.exponentialRampToValueAtTime(.001,t+.4);o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+.4)}

  }
};

const $=s=>document.querySelector(s);
const $$=s=>document.querySelectorAll(s);
function makeCanvas(ct){
  const c=document.createElement('canvas');c.style.cssText='width:100%;height:100%;display:block';
  ct.appendChild(c);
  function resize(){c.width=c.offsetWidth*devicePixelRatio;c.height=c.offsetHeight*devicePixelRatio;c.getContext('2d').scale(devicePixelRatio,devicePixelRatio)}
  resize();const ro=new ResizeObserver(resize);ro.observe(c);
  return{canvas:c,ctx:c.getContext('2d'),W:()=>c.offsetWidth,H:()=>c.offsetHeight,kill(){ro.disconnect()}};
}
function swipe(el,cb){
  let sx,sy;
  el.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY},{passive:true});
  el.addEventListener('touchend',e=>{if(sx==null)return;const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;if(Math.max(Math.abs(dx),Math.abs(dy))>30){if(Math.abs(dx)>Math.abs(dy))cb(dx>0?'right':'left');else cb(dy>0?'down':'up')}sx=null},{passive:true});
}
function score(s){$('#act-score').textContent=s}
function addDpad(ct,onDir){
  const d=document.createElement('div');d.className='dpad';
  ['up','left','down','right'].forEach(dir=>{
    const b=document.createElement('button');b.className='dp-'+dir;
    b.textContent={up:'▲',left:'◀',down:'▼',right:'▶'}[dir];
    b.addEventListener('touchstart',e=>{e.preventDefault();e.stopPropagation();onDir(dir)},{passive:false});
    b.onclick=()=>onDir(dir);d.appendChild(b);
  });
  ct.appendChild(d);return d;
}
function addTetrisPad(ct,onLeft,onRight,onRotate,onDrop){
  const d=document.createElement('div');d.className='tpad';
  const btns=[['◀',onLeft],['▶',onRight],['↻',onRotate],['▼',onDrop]];
  btns.forEach(([label,fn])=>{
    const b=document.createElement('button');b.textContent=label;
    b.addEventListener('touchstart',e=>{e.preventDefault();e.stopPropagation();fn()},{passive:false});
    b.onclick=fn;d.appendChild(b);
  });
  ct.appendChild(d);return d;
}
function titleScreen(ct,title,hint,cb){
  const o=document.createElement('div');o.className='overlay';o.style.zIndex='10';
  o.innerHTML=`<h2 style="font-size:36px;margin-bottom:4px">${title}</h2><p style="color:var(--text2);font-size:14px;margin-bottom:24px">${hint}</p><button class="btn">Play</button>`;
  ct.appendChild(o);o.querySelector('button').onclick=()=>{o.remove();cb()};
}

function renderTabs(){
  const nav=$('#tabs');nav.innerHTML='';
  TABS.forEach(t=>{
    const b=document.createElement('button');b.className='tab'+(filter===t.id?' active':'');
    b.innerHTML=`<span>${t.ic}</span>${t.n}`;
    b.onclick=()=>{filter=t.id;renderTabs();renderHome()};
    nav.appendChild(b);
  });
}

function renderHome(){
  const h=$('#home');let html='<div class="hero"><h1>SkyDeck</h1><p>Your in-flight entertainment</p></div>';
  for(const[cat,info]of Object.entries(CATS)){
    if(filter!=='all'&&filter!==cat)continue;
    const items=ACT.filter(a=>a.cat===cat);
    html+=`<div class="cat-label ${info.color}">${info.label}</div><div class="cards">`;
    items.forEach((a,i)=>{
      const svg=IC_SVG[a.id]||'';const bg=IC_BG[a.id]||'#333,#222';
      html+=`<div class="card ${cat}-card fadeUp" style="animation-delay:${i*40}ms" data-id="${a.id}"><div class="card-ic" style="background:linear-gradient(135deg,${bg})"><svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">${svg}</svg></div><div class="name">${a.n}</div><div class="desc">${a.d}</div></div>`;
    });
    html+='</div>';
  }
  h.innerHTML=html;
  h.querySelectorAll('.card').forEach(c=>{
    c.onclick=()=>{const a=ACT.find(x=>x.id===c.dataset.id);if(a)openAct(a)};
  });
}

// ════════════════════════════════════════════════
// 🐍 SNAKE
// ════════════════════════════════════════════════
function gSnake(ct){
  const{canvas:c,ctx,W,H,kill}=makeCanvas(ct);
  const GS=18;let snake,food,dir,ndir,sc,spd,dead,loop,iv;
  titleScreen(ct,'Snake','Swipe or arrow keys to move',()=>{});
  function reset(){
    const cols=Math.floor(W()/GS),rows=Math.floor(H()/GS),cx=cols>>1,cy=rows>>1;
    snake=[{x:cx,y:cy},{x:cx-1,y:cy},{x:cx-2,y:cy}];
    dir={x:1,y:0};ndir={...dir};sc=0;dead=false;spd=140;
    placeFood();score('0');ct.querySelector('.overlay')?.remove();
    clearInterval(iv);iv=setInterval(tick,spd);
  }
  function placeFood(){const cols=Math.floor(W()/GS),rows=Math.floor(H()/GS);do{food={x:Math.random()*cols|0,y:Math.random()*rows|0}}while(snake.some(s=>s.x===food.x&&s.y===food.y))}
  function tick(){
    if(dead)return;dir={...ndir};
    const h={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
    const cols=Math.floor(W()/GS),rows=Math.floor(H()/GS);
    if(h.x<0||h.x>=cols||h.y<0||h.y>=rows||snake.some(s=>s.x===h.x&&s.y===h.y)){dead=true;A.lose();clearInterval(iv);showOver();return}
    snake.unshift(h);
    if(h.x===food.x&&h.y===food.y){sc++;score(sc);A.pop();placeFood();if(spd>55){spd-=2;clearInterval(iv);iv=setInterval(tick,spd)}}
    else snake.pop();
  }
  function draw(){
    const w=W(),h=H();ctx.fillStyle='#06080f';ctx.fillRect(0,0,w,h);
    // grid
    ctx.strokeStyle='rgba(255,255,255,.02)';ctx.lineWidth=.5;
    for(let x=0;x<w;x+=GS){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke()}
    for(let y=0;y<h;y+=GS){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke()}
    // food
    ctx.fillStyle='#f87171';ctx.shadowColor='#f87171';ctx.shadowBlur=12;
    ctx.beginPath();ctx.arc(food.x*GS+GS/2,food.y*GS+GS/2,GS/2-2,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    // snake
    snake.forEach((s,i)=>{
      const t=i/snake.length;
      if(i===0){ctx.fillStyle='#fbbf24';ctx.shadowColor='#fbbf24';ctx.shadowBlur=8}
      else{ctx.fillStyle=`hsl(43,${90-t*50}%,${58-t*25}%)`;ctx.shadowBlur=0}
      const r=i===0?6:4;
      ctx.beginPath();ctx.roundRect(s.x*GS+1,s.y*GS+1,GS-2,GS-2,r);ctx.fill();
    });
    ctx.shadowBlur=0;
    loop=requestAnimationFrame(draw);
  }
  function showOver(){const d=document.createElement('div');d.className='overlay';d.innerHTML=`<h2>Game Over</h2><div class="sub">${sc} points</div><button class="btn">Play Again</button>`;d.querySelector('button').onclick=reset;ct.appendChild(d)}
  function onKey(e){const m={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},w:{x:0,y:-1},s:{x:0,y:1},a:{x:-1,y:0},d:{x:1,y:0}};const nd=m[e.key];if(nd&&(nd.x+dir.x||nd.y+dir.y)){ndir=nd;e.preventDefault()}}
  swipe(c,d=>{const m={up:{x:0,y:-1},down:{x:0,y:1},left:{x:-1,y:0},right:{x:1,y:0}};const nd=m[d];if(nd&&(nd.x+dir.x||nd.y+dir.y))ndir=nd});
  addDpad(ct,d=>{const m={up:{x:0,y:-1},down:{x:0,y:1},left:{x:-1,y:0},right:{x:1,y:0}};const nd=m[d];if(nd&&(nd.x+dir.x||nd.y+dir.y))ndir=nd});
  document.addEventListener('keydown',onKey);reset();draw();
  return()=>{clearInterval(iv);cancelAnimationFrame(loop);document.removeEventListener('keydown',onKey);kill()};
}

// ════════════════════════════════════════════════
// 🧩 TETRIS
// ════════════════════════════════════════════════
function gTetris(ct){
  const{canvas:c,ctx,W,H,kill}=makeCanvas(ct);
  titleScreen(ct,'Tetris','Arrow keys or swipe · Space to drop',()=>{});
  const C=10,R=20;
  const P=[{s:[[1,1,1,1]],c:'#06b6d4'},{s:[[1,1],[1,1]],c:'#eab308'},{s:[[0,1,0],[1,1,1]],c:'#a855f7'},{s:[[0,1,1],[1,1,0]],c:'#22c55e'},{s:[[1,1,0],[0,1,1]],c:'#ef4444'},{s:[[1,0,0],[1,1,1]],c:'#3b82f6'},{s:[[0,0,1],[1,1,1]],c:'#f97316'}];
  let board,piece,px,py,sc,lines,lvl,dead,loop,last,dropMs;
  function reset(){board=Array.from({length:R},()=>Array(C).fill(null));sc=0;lines=0;lvl=1;dead=false;dropMs=900;last=0;spawn();score('0');ct.querySelector('.overlay')?.remove()}
  function spawn(){const p=P[Math.random()*P.length|0];piece={s:p.s.map(r=>[...r]),c:p.c};px=(C-piece.s[0].length)/2|0;py=0;if(hit(piece.s,px,py)){dead=true;A.lose();showOver()}}
  function hit(s,ox,oy){for(let r=0;r<s.length;r++)for(let c=0;c<s[r].length;c++){if(!s[r][c])continue;const nx=ox+c,ny=oy+r;if(nx<0||nx>=C||ny>=R||(ny>=0&&board[ny][nx]))return true}return false}
  function lock(){for(let r=0;r<piece.s.length;r++)for(let c=0;c<piece.s[r].length;c++){if(!piece.s[r][c])continue;if(py+r<0){dead=true;A.lose();showOver();return}board[py+r][px+c]=piece.c}clearLines();spawn()}
  function clearLines(){let cl=0;for(let r=R-1;r>=0;r--){if(board[r].every(c=>c)){board.splice(r,1);board.unshift(Array(C).fill(null));cl++;r++}}if(cl){lines+=cl;sc+=[0,100,300,500,800][cl]*lvl;lvl=Math.floor(lines/10)+1;dropMs=Math.max(120,900-lvl*50);A.pop();score(sc)}}
  function rotate(){const s=piece.s,rows=s.length,cols=s[0].length;const rot=Array.from({length:cols},(_,r)=>Array.from({length:rows},(_,c)=>s[rows-1-c][r]));for(const dx of[0,-1,1,-2,2])if(!hit(rot,px+dx,py)){piece.s=rot;px+=dx;return}}
  function move(dx){if(!hit(piece.s,px+dx,py))px+=dx}
  function drop(){if(!hit(piece.s,px,py+1))py++;else lock()}
  function hardDrop(){while(!hit(piece.s,px,py+1))py++;A.hit();lock()}
  function ghostY(){let gy=py;while(!hit(piece.s,px,gy+1))gy++;return gy}
  function draw(t){
    if(!last)last=t;if(!dead&&t-last>dropMs){drop();last=t}
    const bs=Math.min(W()/C,H()/R),ox=(W()-bs*C)/2,oy=(H()-bs*R)/2;
    ctx.fillStyle='#06080f';ctx.fillRect(0,0,W(),H());
    // board bg
    ctx.fillStyle='#0a0e18';ctx.fillRect(ox,oy,bs*C,bs*R);
    ctx.strokeStyle='rgba(255,255,255,.03)';ctx.lineWidth=.5;
    for(let i=0;i<=C;i++){ctx.beginPath();ctx.moveTo(ox+i*bs,oy);ctx.lineTo(ox+i*bs,oy+bs*R);ctx.stroke()}
    for(let i=0;i<=R;i++){ctx.beginPath();ctx.moveTo(ox,oy+i*bs);ctx.lineTo(ox+bs*C,oy+i*bs);ctx.stroke()}
    // locked
    for(let r=0;r<R;r++)for(let c=0;c<C;c++){if(board[r][c]){ctx.fillStyle=board[r][c];ctx.beginPath();ctx.roundRect(ox+c*bs+1,oy+r*bs+1,bs-2,bs-2,3);ctx.fill()}}
    // ghost + piece
    if(!dead){
      const gy=ghostY();
      for(let r=0;r<piece.s.length;r++)for(let c=0;c<piece.s[r].length;c++){
        if(!piece.s[r][c])continue;
        ctx.fillStyle='rgba(255,255,255,.06)';ctx.beginPath();ctx.roundRect(ox+(px+c)*bs+1,oy+(gy+r)*bs+1,bs-2,bs-2,3);ctx.fill();
        ctx.fillStyle=piece.c;ctx.beginPath();ctx.roundRect(ox+(px+c)*bs+1,oy+(py+r)*bs+1,bs-2,bs-2,3);ctx.fill();
      }
    }
    // HUD
    ctx.fillStyle='rgba(255,255,255,.4)';ctx.font='bold 13px Outfit';ctx.textAlign='left';
    ctx.fillText(`LVL ${lvl}`,ox+4,oy-6);
    loop=requestAnimationFrame(draw);
  }
  function showOver(){const d=document.createElement('div');d.className='overlay';d.innerHTML=`<h2>Game Over</h2><div class="sub">${sc} · Lvl ${lvl}</div><button class="btn">Play Again</button>`;d.querySelector('button').onclick=reset;ct.appendChild(d)}
  function onKey(e){if(dead)return;const k=e.key;if(k==='ArrowLeft'||k==='a')move(-1);else if(k==='ArrowRight'||k==='d')move(1);else if(k==='ArrowDown'||k==='s')drop();else if(k==='ArrowUp'||k==='w')rotate();else if(k===' ')hardDrop();else return;e.preventDefault()}
  swipe(c,d=>{if(dead)return;if(d==='left')move(-1);else if(d==='right')move(1);else if(d==='down')hardDrop();else rotate()});
  c.addEventListener('touchstart',e=>{if(dead)return;const r=c.getBoundingClientRect(),x=(e.touches[0].clientX-r.left)/r.width;if(x<.3)move(-1);else if(x>.7)move(1);else rotate()},{passive:true});
  addTetrisPad(ct,()=>move(-1),()=>move(1),rotate,hardDrop);
  document.addEventListener('keydown',onKey);reset();loop=requestAnimationFrame(draw);
  return()=>{cancelAnimationFrame(loop);document.removeEventListener('keydown',onKey);kill()};
}

// ════════════════════════════════════════════════
// 🐦 FLAPPY BIRD
// ════════════════════════════════════════════════
function gFlappy(ct){
  const{canvas:c,ctx,W,H,kill}=makeCanvas(ct);
  titleScreen(ct,'Flappy Bird','Tap or Space to fly through the pipes!',()=>{});
  let bird,pipes,sc,dead,started,loop,frame=0;
  const GAP=170,PIPE_W=52,GRAVITY=.35,FLAP=-7,SPEED=2.2;
  function reset(){
    bird={x:W()*.25,y:H()/2,vy:0,rot:0};pipes=[];sc=0;dead=false;started=false;frame=0;
    score('0');ct.querySelector('.overlay')?.remove();
  }
  function addPipe(){
    const minY=100,maxY=H()-GAP-100;
    const topH=minY+Math.random()*(maxY-minY);
    pipes.push({x:W(),topH,passed:false});
  }
  function tap(){
    if(dead){reset();return}
    if(!started)started=true;
    bird.vy=FLAP;A.flap();
  }
  function update(){
    if(!started||dead)return;
    bird.vy+=GRAVITY;bird.y+=bird.vy;
    bird.rot=Math.min(Math.PI/4,Math.max(-Math.PI/4,bird.vy*.06));
    frame++;if(frame%120===0)addPipe();
    pipes.forEach(p=>p.x-=SPEED);
    pipes=pipes.filter(p=>p.x>-PIPE_W-10);
    // collision
    const bx=bird.x,by=bird.y,br=14;
    if(by-br<0||by+br>H()-50){die();return}
    for(const p of pipes){
      if(bx+br>p.x&&bx-br<p.x+PIPE_W){
        if(by-br<p.topH||by+br>p.topH+GAP){die();return}
      }
      if(!p.passed&&p.x+PIPE_W<bx){p.passed=true;sc++;score(sc);A.pop()}
    }
  }
  function die(){dead=true;A.lose();showOver()}
  function drawBird(){
    ctx.save();ctx.translate(bird.x,bird.y);ctx.rotate(bird.rot);
    // body
    ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.ellipse(0,0,16,13,0,0,Math.PI*2);ctx.fill();
    // wing
    const wingY=Math.sin(frame*.3)*3;
    ctx.fillStyle='#f59e0b';ctx.beginPath();ctx.ellipse(-4,wingY+2,10,6,-.2,0,Math.PI*2);ctx.fill();
    // eye
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(8,-3,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#000';ctx.beginPath();ctx.arc(9.5,-3,2.5,0,Math.PI*2);ctx.fill();
    // beak
    ctx.fillStyle='#f97316';ctx.beginPath();ctx.moveTo(14,-2);ctx.lineTo(22,1);ctx.lineTo(14,4);ctx.closePath();ctx.fill();
    ctx.restore();
  }
  function drawPipe(x,topH){
    const botY=topH+GAP,w=PIPE_W;
    // top pipe
    const tg=ctx.createLinearGradient(x,0,x+w,0);tg.addColorStop(0,'#16a34a');tg.addColorStop(.5,'#22c55e');tg.addColorStop(1,'#15803d');
    ctx.fillStyle=tg;ctx.beginPath();ctx.roundRect(x,0,w,topH,0);ctx.fill();
    // top cap
    ctx.fillStyle='#15803d';ctx.beginPath();ctx.roundRect(x-4,topH-26,w+8,26,[0,0,6,6]);ctx.fill();
    ctx.fillStyle='#22c55e';ctx.beginPath();ctx.roundRect(x-2,topH-24,w+4,22,[0,0,4,4]);ctx.fill();
    // bottom pipe
    const bg=ctx.createLinearGradient(x,0,x+w,0);bg.addColorStop(0,'#16a34a');bg.addColorStop(.5,'#22c55e');bg.addColorStop(1,'#15803d');
    ctx.fillStyle=bg;ctx.beginPath();ctx.roundRect(x,botY,w,H()-botY,0);ctx.fill();
    // bottom cap
    ctx.fillStyle='#15803d';ctx.beginPath();ctx.roundRect(x-4,botY,w+8,26,[6,6,0,0]);ctx.fill();
    ctx.fillStyle='#22c55e';ctx.beginPath();ctx.roundRect(x-2,botY+2,w+4,22,[4,4,0,0]);ctx.fill();
  }
  function draw(){
    update();const w=W(),h=H();
    // sky gradient
    const sky=ctx.createLinearGradient(0,0,0,h);sky.addColorStop(0,'#0c1445');sky.addColorStop(.6,'#1a2760');sky.addColorStop(1,'#2a4a30');
    ctx.fillStyle=sky;ctx.fillRect(0,0,w,h);
    // stars
    if(!draw.stars)draw.stars=Array.from({length:40},()=>({x:Math.random()*1200,y:Math.random()*400,r:Math.random()*1.5+.5}));
    ctx.fillStyle='rgba(255,255,255,.4)';draw.stars.forEach(s=>{ctx.beginPath();ctx.arc(s.x%w,s.y,s.r,0,Math.PI*2);ctx.fill()});
    // ground
    const groundY=h-50;
    ctx.fillStyle='#3a2a1a';ctx.fillRect(0,groundY,w,50);
    ctx.fillStyle='#5a4a2a';ctx.fillRect(0,groundY,w,6);
    // pipes
    pipes.forEach(p=>drawPipe(p.x,p.topH));
    // bird
    drawBird();
    // score
    if(started){
      ctx.fillStyle='#fff';ctx.font='bold 48px Outfit';ctx.textAlign='center';ctx.shadowColor='rgba(0,0,0,.5)';ctx.shadowBlur=8;
      ctx.fillText(sc,w/2,80);ctx.shadowBlur=0;
    }
    if(!started&&!dead){
      ctx.fillStyle='rgba(255,255,255,.7)';ctx.font='18px Outfit';ctx.textAlign='center';
      ctx.fillText('Tap or press Space to fly!',w/2,h/2+60);
    }
    loop=requestAnimationFrame(draw);
  }
  function showOver(){const d=document.createElement('div');d.className='overlay';d.innerHTML=`<h2>Game Over</h2><div class="sub">${sc} pipes</div><button class="btn">Try Again</button>`;d.querySelector('button').onclick=reset;ct.appendChild(d)}
  function onKey(e){if(e.key===' '||e.key==='ArrowUp'){tap();e.preventDefault()}}
  c.addEventListener('click',tap);c.addEventListener('touchstart',e=>{tap();e.preventDefault()},{passive:false});
  document.addEventListener('keydown',onKey);reset();loop=requestAnimationFrame(draw);
  return()=>{cancelAnimationFrame(loop);document.removeEventListener('keydown',onKey);kill()};
}

// ════════════════════════════════════════════════
// 🔢 2048
// ════════════════════════════════════════════════
function g2048(ct){
  let grid,sc,moved,cells=[];
  const el=document.createElement('div');
  el.innerHTML='<div class="hud"><span>Score <b id="s20">0</b></span><button class="btn btn-sm btn-ghost" id="r20">New Game</button></div><div class="g2048" id="g20"></div>';
  ct.appendChild(el);const ge=$('#g20');
  function initCells(){ge.innerHTML='';cells=[];for(let i=0;i<16;i++){const d=document.createElement('div');d.className='t2048';ge.appendChild(d);cells.push(d)}}
  function reset(){grid=Array.from({length:4},()=>Array(4).fill(0));sc=0;initCells();add();add();render();score('0');ct.querySelector('.overlay')?.remove()}
  function add(){const e=[];grid.forEach((r,ri)=>r.forEach((v,ci)=>{if(!v)e.push([ri,ci])}));if(!e.length)return;const[r,c]=e[Math.random()*e.length|0];grid[r][c]=Math.random()<.9?2:4}
  function render(){
    let i=0;grid.forEach(r=>r.forEach(v=>{const d=cells[i++];const old=d.dataset.v||'';const nv=v?''+v:'';if(old!==nv){d.dataset.v=nv;d.textContent=v||'';if(nv)d.removeAttribute('style');else delete d.dataset.v}}));
    $('#s20').textContent=sc;score(sc);
  }
  function slide(row){let r=row.filter(v=>v);for(let i=0;i<r.length-1;i++){if(r[i]===r[i+1]){r[i]*=2;sc+=r[i];r.splice(i+1,1);moved=true;A.click()}}while(r.length<4)r.push(0);for(let i=0;i<4;i++)if(r[i]!==row[i])moved=true;return r}
  function go(d){
    moved=false;
    if(d==='left')for(let r=0;r<4;r++)grid[r]=slide(grid[r]);
    else if(d==='right')for(let r=0;r<4;r++)grid[r]=slide(grid[r].reverse()).reverse();
    else if(d==='up')for(let c=0;c<4;c++){let col=grid.map(r=>r[c]);col=slide(col);col.forEach((v,r)=>grid[r][c]=v)}
    else for(let c=0;c<4;c++){let col=grid.map(r=>r[c]).reverse();col=slide(col).reverse();col.forEach((v,r)=>grid[r][c]=v)}
    if(moved){add();render();if(isOver()){A.lose();showOver()}}
  }
  function isOver(){for(let r=0;r<4;r++)for(let c=0;c<4;c++){if(!grid[r][c])return false;if(c<3&&grid[r][c]===grid[r][c+1])return false;if(r<3&&grid[r][c]===grid[r+1][c])return false}return true}
  function showOver(){const d=document.createElement('div');d.className='overlay';d.innerHTML=`<h2>No Moves</h2><div class="sub">${sc}</div><button class="btn">Play Again</button>`;d.querySelector('button').onclick=reset;ct.appendChild(d)}
  function onKey(e){const m={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down',a:'left',d:'right',w:'up',s:'down'};if(m[e.key]){go(m[e.key]);e.preventDefault()}}
  swipe(ct,go);document.addEventListener('keydown',onKey);$('#r20').onclick=reset;reset();
  return()=>{document.removeEventListener('keydown',onKey);ct.innerHTML=''};
}

// ════════════════════════════════════════════════
// 🃏 MEMORY MATCH
// ════════════════════════════════════════════════
function gMemory(ct){
  const emoji=['🍎','🍊','🍋','🍇','🍉','🍓','🫐','🥝','🍑','🥭','🍍','🌮','🍕','🍔','🍩','🧁','🎸','🎮'];
  let cards,flipped,matched,moves,cols,rows,locked;
  const el=document.createElement('div');
  el.innerHTML='<div class="hud"><span>Moves <b id="mm-m">0</b></span><select id="mm-d" style="background:var(--elevated);color:var(--text);border:1px solid var(--glass-border);border-radius:8px;padding:4px 10px;font-size:13px;font-family:Outfit"><option value="12">Easy</option><option value="16" selected>Medium</option><option value="24">Hard</option></select></div><div class="mem-g" id="mm-g"></div>';
  ct.appendChild(el);$('#mm-d').onchange=()=>reset(+$('#mm-d').value);
  function reset(n=16){cols=n<=12?4:n<=16?4:6;rows=n/cols;locked=false;const picks=emoji.slice(0,n/2);cards=[...picks,...picks].sort(()=>Math.random()-.5);flipped=[];matched=new Set();moves=0;render();score('0')}
  function render(){
    const g=$('#mm-g');g.style.gridTemplateColumns=`repeat(${cols},1fr)`;g.innerHTML='';
    cards.forEach((e,i)=>{const d=document.createElement('div');d.className='mem-c';if(matched.has(i))d.classList.add('match');if(flipped.includes(i))d.classList.add('flip');d.innerHTML=`<span class="face">${e}</span>`;d.onclick=()=>flip(i);g.appendChild(d)});
    $('#mm-m').textContent=moves;
  }
  function flip(i){
    if(locked||flipped.includes(i)||matched.has(i))return;flipped.push(i);A.click();render();
    if(flipped.length===2){moves++;locked=true;
      if(cards[flipped[0]]===cards[flipped[1]]){matched.add(flipped[0]);matched.add(flipped[1]);flipped=[];locked=false;A.pop();render();score(matched.size===cards.length?'WIN ✓':`${moves}`);if(matched.size===cards.length)A.win()}
      else{setTimeout(()=>{flipped=[];locked=false;render()},650);score(`${moves}`)}}
  }
  reset();return()=>{ct.innerHTML=''};
}

// ════════════════════════════════════════════════
// 🔨 WHACK-A-MOLE
// ════════════════════════════════════════════════
function gWhack(ct){
  let sc,time,active,timer,st,holes;
  const el=document.createElement('div');
  el.innerHTML='<div class="hud"><span>Score <b id="wh-s">0</b></span><span><b id="wh-t">30</b>s</span></div><div class="wh-g" id="wh-g"></div>';
  ct.appendChild(el);

    const g=$('#wh-g');g.innerHTML='';for(let i=0;i<9;i++){const h=document.createElement('div');h.className='wh-h';h.onclick=()=>whack(i);g.appendChild(h)}

// ════════════════════════════════════════════════
// 🏓 BRICK BREAKER
// ════════════════════════════════════════════════
function gBreaker(ct){
  const{canvas:c,ctx,W,H,kill}=makeCanvas(ct);
  titleScreen(ct,'Brick Breaker','Move mouse/finger to control paddle',()=>{});
  let paddle,ball,bricks,sc,lives,dead,loop,pw=100,ph=12;
  const ROWS=5,COLS=8,colors=['#ef4444','#f97316','#eab308','#22c55e','#3b82f6'];
  function reset(){
    sc=0;lives=3;dead=false;
    paddle={x:W()/2-pw/2,y:H()-28,w:pw,h:ph};resetBall();
    bricks=[];const bw=(W()-16)/COLS;
    for(let r=0;r<ROWS;r++)for(let cl=0;cl<COLS;cl++)bricks.push({x:8+cl*bw,y:40+r*26,w:bw-3,h:22,c:colors[r],alive:true});
    score('0');ct.querySelector('.overlay')?.remove();
  }
  function resetBall(){ball={x:W()/2,y:H()-50,dx:2.5*(Math.random()>.5?1:-1),dy:-3.5,r:7}}
  function update(){
    if(dead)return;
    ball.x+=ball.dx;ball.y+=ball.dy;
    if(ball.x-ball.r<0||ball.x+ball.r>W())ball.dx*=-1;
    if(ball.y-ball.r<0)ball.dy*=-1;
    if(ball.y+ball.r>H()){lives--;if(lives<=0){dead=true;A.lose();showOver()}else resetBall();return}
    if(ball.y+ball.r>=paddle.y&&ball.x>=paddle.x&&ball.x<=paddle.x+paddle.w&&ball.dy>0){ball.dy*=-1;ball.dx+=(ball.x-(paddle.x+paddle.w/2))*.1;A.click()}
    for(const b of bricks){if(!b.alive)continue;if(ball.x+ball.r>b.x&&ball.x-ball.r<b.x+b.w&&ball.y+ball.r>b.y&&ball.y-ball.r<b.y+b.h){b.alive=false;ball.dy*=-1;sc+=10;score(sc);A.pop();if(bricks.every(b=>!b.alive)){A.win();dead=true;showWin()}break}}
  }
  function draw(){
    const w=W(),h=H();ctx.fillStyle='#06080f';ctx.fillRect(0,0,w,h);
    // paddle
    ctx.fillStyle='#fbbf24';ctx.shadowColor='#fbbf24';ctx.shadowBlur=10;
    ctx.beginPath();ctx.roundRect(paddle.x,paddle.y,paddle.w,paddle.h,6);ctx.fill();ctx.shadowBlur=0;
    // ball
    ctx.fillStyle='#fff';ctx.shadowColor='#fff';ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    // bricks
    for(const b of bricks){if(!b.alive)continue;ctx.fillStyle=b.c;ctx.beginPath();ctx.roundRect(b.x,b.y,b.w,b.h,4);ctx.fill()}
    // lives
    ctx.fillStyle='#f87171';ctx.font='14px sans-serif';ctx.textAlign='left';ctx.fillText('♥'.repeat(lives),8,20);
    loop=requestAnimationFrame(()=>{update();draw()});
  }
  function showOver(){const d=document.createElement('div');d.className='overlay';d.innerHTML=`<h2>Game Over</h2><div class="sub">${sc}</div><button class="btn">Retry</button>`;d.querySelector('button').onclick=reset;ct.appendChild(d)}
  function showWin(){const d=document.createElement('div');d.className='overlay';d.innerHTML=`<h2>You Win!</h2><div class="sub">${sc}</div><button class="btn">Again</button>`;d.querySelector('button').onclick=reset;ct.appendChild(d)}
  c.addEventListener('mousemove',e=>{const r=c.getBoundingClientRect();paddle.x=Math.max(0,Math.min(W()-pw,(e.clientX-r.left)/(r.width/W())-pw/2))});
  c.addEventListener('touchmove',e=>{const r=c.getBoundingClientRect();paddle.x=Math.max(0,Math.min(W()-pw,(e.touches[0].clientX-r.left)/(r.width/W())-pw/2))},{passive:true});
  reset();draw();return()=>{cancelAnimationFrame(loop);kill()};
}

// 💣 MINESWEEPER
// ════════════════════════════════════════════════
function gMines(ct){
  const SZ=10,MN=12;let grid,rev,flag,dead,first,won;
  const el=document.createElement('div');
  el.innerHTML=`<div class="hud"><span>💣 <b id="mi-m">12</b></span><span id="mi-s">Tap to start</span></div><div class="mine-g" id="mi-g" style="grid-template-columns:repeat(${SZ},1fr)"></div>`;
  ct.appendChild(el);
  function reset(){grid=Array.from({length:SZ},()=>Array(SZ).fill(0));rev=Array.from({length:SZ},()=>Array(SZ).fill(false));flag=Array.from({length:SZ},()=>Array(SZ).fill(false));dead=false;won=false;first=true;$('#mi-s').textContent='Tap to start';ct.querySelector('.overlay')?.remove();render()}
  function place(sr,sc){let p=0;while(p<MN){const r=Math.random()*SZ|0,c=Math.random()*SZ|0;if(grid[r][c]===-1||Math.abs(r-sr)<=1&&Math.abs(c-sc)<=1)continue;grid[r][c]=-1;p++}for(let r=0;r<SZ;r++)for(let c=0;c<SZ;c++){if(grid[r][c]===-1)continue;let n=0;for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){const nr=r+dr,nc=c+dc;if(nr>=0&&nr<SZ&&nc>=0&&nc<SZ&&grid[nr][nc]===-1)n++}grid[r][c]=n}}
  function reveal(r,c){if(r<0||r>=SZ||c<0||c>=SZ||rev[r][c]||flag[r][c])return;rev[r][c]=true;if(grid[r][c]===0)for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++)reveal(r+dr,c+dc)}
  function checkWin(){let cnt=0;for(let r=0;r<SZ;r++)for(let c=0;c<SZ;c++)if(rev[r][c])cnt++;if(cnt===SZ*SZ-MN){won=true;A.win();$('#mi-s').textContent='You Win!';score('WIN')}}
  function render(){
    const g=$('#mi-g');g.innerHTML='';let fc=0;
    for(let r=0;r<SZ;r++)for(let c=0;c<SZ;c++){
      const btn=document.createElement('button');btn.className='mine-c';
      if(rev[r][c]){btn.classList.add('rev');if(grid[r][c]===-1){btn.classList.add('boom');btn.textContent='💥'}else if(grid[r][c]>0){btn.textContent=grid[r][c];btn.classList.add('m'+grid[r][c])}}
      else if(flag[r][c]){btn.classList.add('flag');btn.textContent='🚩';fc++}
      btn.onclick=()=>click(r,c);btn.oncontextmenu=e=>{e.preventDefault();toggleFlag(r,c)};
      let lp;btn.addEventListener('touchstart',()=>{lp=setTimeout(()=>{toggleFlag(r,c);lp=null},400)},{passive:true});
      btn.addEventListener('touchend',()=>{if(lp)clearTimeout(lp)},{passive:true});
      btn.addEventListener('touchmove',()=>{clearTimeout(lp);lp=null},{passive:true});
      g.appendChild(btn);
    }$('#mi-m').textContent=MN-fc;
  }
  function click(r,c){if(dead||won||flag[r][c])return;if(first){first=false;place(r,c);$('#mi-s').textContent='Playing'}
    if(grid[r][c]===-1){dead=true;for(let rr=0;rr<SZ;rr++)for(let cc=0;cc<SZ;cc++)if(grid[rr][cc]===-1)rev[rr][cc]=true;rev[r][c]=true;A.lose();render();
      const d=document.createElement('div');d.className='overlay';d.innerHTML='<h2>Boom!</h2><button class="btn">Retry</button>';d.querySelector('button').onclick=reset;ct.appendChild(d);return}
    reveal(r,c);A.click();checkWin();render()}
  function toggleFlag(r,c){if(dead||won||rev[r][c])return;flag[r][c]=!flag[r][c];A.click();render()}
  reset();return()=>{ct.innerHTML=''};
}

function gRunner(ct){

    ct.querySelector('.overlay')?.remove();score('0');
  }

    if(dead)return;sc++;if(sc%200===0)spd+=.15;score(sc/10|0);
    player.vy+=.55;player.y+=player.vy;
    if(player.y>=groundY){player.y=groundY;player.vy=0;player.onG=true}

    for(const o of obs)if(player.x+player.w>o.x+3&&player.x<o.x+o.w-3&&player.y+player.h>o.y+3){dead=true;A.lose();showOver();return}

    // player
    ctx.fillStyle='#fbbf24';ctx.shadowColor='#fbbf24';ctx.shadowBlur=8;
    ctx.beginPath();ctx.roundRect(player.x,player.y,player.w,player.h,5);ctx.fill();
    ctx.fillStyle='#f59e0b';ctx.fillRect(player.x+4,player.y+6,4,4);ctx.fillRect(player.x+12,player.y+6,4,4);
    ctx.shadowBlur=0;
    // obstacles

    // score
    ctx.fillStyle='rgba(255,255,255,.3)';ctx.font='bold 40px JetBrains Mono';ctx.textAlign='center';ctx.fillText(sc/10|0,w/2,h/2);
    loop=requestAnimationFrame(()=>{update();draw()});
  }
  function showOver(){const d=document.createElement('div');d.className='overlay';d.innerHTML=`<h2>Crashed</h2><div class="sub">${sc/10|0}m</div><button class="btn">Run Again</button>`;d.querySelector('button').onclick=reset;ct.appendChild(d)}
  function onKey(e){if(e.key===' '||e.key==='ArrowUp'){jump();e.preventDefault()}}
  c.addEventListener('touchstart',e=>{if(!dead)jump();e.preventDefault()},{passive:false});
  c.addEventListener('click',()=>{if(!dead)jump()});
  document.addEventListener('keydown',onKey);reset();draw();
  return()=>{cancelAnimationFrame(loop);document.removeEventListener('keydown',onKey);kill()};
}

// ════════════════════════════════════════════════
// 🌀 FIDGET SPINNER
// ════════════════════════════════════════════════
function fSpinner(ct){
  const{canvas:c,ctx,W,H,kill}=makeCanvas(ct);
  let angle=0,vel=0,dragging=false,lastA=0,loop;
  const cx=()=>W()/2,cy=()=>H()/2,R=()=>Math.min(W(),H())*.28;
  function getA(x,y){return Math.atan2(y-cy(),x-cx())}
  function draw(){
    const w=W(),h=H();ctx.clearRect(0,0,w,h);
    if(!dragging){angle+=vel;vel*=.996;if(Math.abs(vel)<.0001)vel=0}
    ctx.save();ctx.translate(cx(),cy());ctx.rotate(angle);
    const r=R();
    for(let i=0;i<3;i++){
      const a=i*Math.PI*2/3;const bx=Math.cos(a)*r*.55,by=Math.sin(a)*r*.55;
      // arm
      ctx.fillStyle='#1a2340';ctx.beginPath();ctx.ellipse(bx*.5,by*.5,r*.12,r*.5,a+Math.PI/2,0,Math.PI*2);ctx.fill();
      // lobe
      const lg=ctx.createRadialGradient(bx,by,0,bx,by,r*.3);lg.addColorStop(0,'#2a3560');lg.addColorStop(1,'#1a2340');
      ctx.fillStyle=lg;ctx.beginPath();ctx.arc(bx,by,r*.3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.arc(bx,by,r*.15,0,Math.PI*2);ctx.fill();
    }
    // center
    const cg=ctx.createRadialGradient(0,0,0,0,0,r*.2);cg.addColorStop(0,'#3d4a60');cg.addColorStop(1,'#1a2340');
    ctx.fillStyle=cg;ctx.beginPath();ctx.arc(0,0,r*.2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.arc(0,0,r*.1,0,Math.PI*2);ctx.fill();
    ctx.restore();
    // RPM
    const rpm=Math.abs(vel)*60/(2*Math.PI);
    ctx.fillStyle='#fbbf24';ctx.font='bold 52px JetBrains Mono';ctx.textAlign='center';ctx.fillText(Math.floor(rpm),cx(),70);
    ctx.fillStyle='#6b7a94';ctx.font='600 13px Outfit';ctx.fillText('RPM',cx(),90);
    if(!dragging&&vel===0){ctx.fillStyle='#6b7a94';ctx.font='15px Outfit';ctx.fillText('Flick to spin!',cx(),cy()+R()+50)}
    loop=requestAnimationFrame(draw);
  }
  function pd(x,y){dragging=true;lastA=getA(x,y)}
  function pm(x,y){if(!dragging)return;const a=getA(x,y);let da=a-lastA;if(da>Math.PI)da-=2*Math.PI;if(da<-Math.PI)da+=2*Math.PI;angle+=da;vel=da;lastA=a}
  function pu(){dragging=false}
  c.addEventListener('mousedown',e=>{const r=c.getBoundingClientRect();pd(e.clientX-r.left,e.clientY-r.top)});
  c.addEventListener('mousemove',e=>{const r=c.getBoundingClientRect();pm(e.clientX-r.left,e.clientY-r.top)});
  c.addEventListener('mouseup',pu);
  c.addEventListener('touchstart',e=>{const r=c.getBoundingClientRect();pd(e.touches[0].clientX-r.left,e.touches[0].clientY-r.top)},{passive:true});
  c.addEventListener('touchmove',e=>{const r=c.getBoundingClientRect();pm(e.touches[0].clientX-r.left,e.touches[0].clientY-r.top)},{passive:true});
  c.addEventListener('touchend',pu,{passive:true});
  draw();return()=>{cancelAnimationFrame(loop);kill()};
}

// ════════════════════════════════════════════════
// 📿 INFINITY BEADS
// ════════════════════════════════════════════════
function fBeads(ct){
  const{canvas:c,ctx,W,H,kill}=makeCanvas(ct);
  const N=18;let angles=[],drag=-1,lastA=0,loop;
  for(let i=0;i<N;i++)angles.push(i/N*Math.PI*2);
  const cx=()=>W()/2,cy=()=>H()/2,rx=()=>Math.min(W(),H())*.3,ry=()=>Math.min(W(),H())*.18;
  function pos(a){return{x:cx()+Math.cos(a)*rx(),y:cy()+Math.sin(a*2)*.5*ry()+Math.sin(a)*ry()}}
  function draw(){
    ctx.clearRect(0,0,W(),H());
    // track
    ctx.strokeStyle='#1a2340';ctx.lineWidth=6;ctx.beginPath();
    for(let a=0;a<=Math.PI*2;a+=.04){const p=pos(a);a===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y)}ctx.closePath();ctx.stroke();
    const cols=['#ef4444','#f97316','#eab308','#22c55e','#3b82f6','#8b5cf6','#ec4899','#06b6d4','#10b981','#a855f7'];
    angles.forEach((a,i)=>{const p=pos(a);
      ctx.fillStyle=cols[i%cols.length];ctx.shadowColor=cols[i%cols.length];ctx.shadowBlur=6;
      ctx.beginPath();ctx.arc(p.x,p.y,11,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;ctx.fillStyle='rgba(255,255,255,.25)';ctx.beginPath();ctx.arc(p.x-3,p.y-3,3.5,0,Math.PI*2);ctx.fill();
    });
    ctx.fillStyle='#6b7a94';ctx.font='14px Outfit';ctx.textAlign='center';ctx.fillText('Drag the beads',cx(),H()-24);
    loop=requestAnimationFrame(draw);
  }
  function find(x,y){for(let i=0;i<N;i++){const p=pos(angles[i]);if(Math.hypot(x-p.x,y-p.y)<18)return i}return-1}
  function pd(x,y){drag=find(x,y);if(drag>=0)lastA=Math.atan2(y-cy(),x-cx())}
  function pm(x,y){if(drag<0)return;const a=Math.atan2(y-cy(),x-cx());let da=a-lastA;if(da>Math.PI)da-=2*Math.PI;if(da<-Math.PI)da+=2*Math.PI;angles=angles.map(b=>b+da);lastA=a}
  c.addEventListener('mousedown',e=>{const r=c.getBoundingClientRect();pd(e.clientX-r.left,e.clientY-r.top)});
  c.addEventListener('mousemove',e=>{const r=c.getBoundingClientRect();pm(e.clientX-r.left,e.clientY-r.top)});
  c.addEventListener('mouseup',()=>drag=-1);
  c.addEventListener('touchstart',e=>{const r=c.getBoundingClientRect();pd(e.touches[0].clientX-r.left,e.touches[0].clientY-r.top)},{passive:true});
  c.addEventListener('touchmove',e=>{const r=c.getBoundingClientRect();pm(e.touches[0].clientX-r.left,e.touches[0].clientY-r.top)},{passive:true});
  c.addEventListener('touchend',()=>drag=-1,{passive:true});
  draw();return()=>{cancelAnimationFrame(loop);kill()};
}

// 🫠 LAVA LAMP
// ════════════════════════════════════════════════
function wLava(ct){
  const{canvas:c,ctx,W,H,kill}=makeCanvas(ct);
  let blobs=[],loop;for(let i=0;i<7;i++)blobs.push({x:Math.random(),y:Math.random(),r:25+Math.random()*45,vx:(Math.random()-.5)*.003,vy:(Math.random()-.5)*.004,hue:20+Math.random()*30});
  function draw(){
    const w=W(),h=H();const img=ctx.createImageData(w,h);const d=img.data;
    for(let y=0;y<h;y+=2)for(let x=0;x<w;x+=2){
      let sum=0;for(const b of blobs){const dx=x-b.x*w,dy=y-b.y*h;sum+=b.r*b.r/(dx*dx+dy*dy+1)}
      const idx=(y*w+x)*4;
      if(sum>.2){const t=Math.min(1,(sum-.2)*3);d[idx]=251*t|0;d[idx+1]=(120+sum*80)*t|0;d[idx+2]=36*t|0;d[idx+3]=255}
      else{d[idx]=6;d[idx+1]=8;d[idx+2]=15;d[idx+3]=255}
      // fill 2x2
      if(x+1<w){d[idx+4]=d[idx];d[idx+5]=d[idx+1];d[idx+6]=d[idx+2];d[idx+7]=d[idx+3]}
      if(y+1<h){const i2=((y+1)*w+x)*4;d[i2]=d[idx];d[i2+1]=d[idx+1];d[i2+2]=d[idx+2];d[i2+3]=d[idx+3];if(x+1<w){d[i2+4]=d[idx];d[i2+5]=d[idx+1];d[i2+6]=d[idx+2];d[i2+7]=d[idx+3]}}
    }
    ctx.putImageData(img,0,0);
    blobs.forEach(b=>{b.x+=b.vx;b.y+=b.vy;if(b.x<0||b.x>1)b.vx*=-1;if(b.y<0||b.y>1)b.vy*=-1});
    loop=requestAnimationFrame(draw);
  }
  draw();return()=>{cancelAnimationFrame(loop);kill()};
}

// ════════════════════════════════════════════════
// ❌ TIC-TAC-TOE
// ════════════════════════════════════════════════
function gTTT(ct){
  let board,turn,over,aiMode=true,cells=[];
  const WINS=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  const el=document.createElement('div');
  el.innerHTML='<div class="hud"><span id="ttt-s">Your turn (X)</span><button class="btn btn-sm btn-ghost" id="ttt-r">New</button></div><div class="ttt-g" id="ttt-g"></div>';
  ct.appendChild(el);
  // Create persistent cells
  const g=$('#ttt-g');
  for(let i=0;i<9;i++){const c=document.createElement('div');c.className='ttt-c';c.onclick=()=>play(i);g.appendChild(c);cells.push(c)}
  function reset(){board=Array(9).fill('');turn='X';over=false;render();score('')}
  function check(b){for(const[a,bb,c]of WINS)if(b[a]&&b[a]===b[bb]&&b[bb]===b[c])return{winner:b[a],line:[a,bb,c]};if(b.every(c=>c))return{winner:'draw'};return null}
  function minimax(b,isMax,depth=0){
    const r=check(b);if(r){if(r.winner==='O')return 10-depth;if(r.winner==='X')return depth-10;return 0}
    let best=isMax?-Infinity:Infinity;
    for(let i=0;i<9;i++){if(b[i])continue;b[i]=isMax?'O':'X';const s=minimax(b,!isMax,depth+1);b[i]='';best=isMax?Math.max(best,s):Math.min(best,s)}
    return best;
  }
  function aiMove(){
    let bestScore=-Infinity,bestIdx=0;
    for(let i=0;i<9;i++){if(board[i])continue;board[i]='O';const s=minimax(board,false,0);board[i]='';if(s>bestScore){bestScore=s;bestIdx=i}}
    board[bestIdx]='O';A.click();
  }
  function render(){
    const result=check(board);
    cells.forEach((c,i)=>{
      c.className='ttt-c';c.textContent='';
      if(board[i]==='X'){c.classList.add('x');c.textContent='✕'}
      else if(board[i]==='O'){c.classList.add('o');c.textContent='○'}
      if(result&&result.line&&result.line.includes(i))c.classList.add('win');
    });
    if(result){
      over=true;
      if(result.winner==='draw'){$('#ttt-s').textContent='Draw!';score('Draw')}
      else if(result.winner==='X'){$('#ttt-s').textContent='You win!';score('Win!');A.win()}
      else{$('#ttt-s').textContent='AI wins!';score('Loss');A.lose()}
    }else{$('#ttt-s').textContent=turn==='X'?'Your turn (X)':'AI thinking...'}
  }
  function play(i){
    if(over||board[i]||turn!=='X')return;
    board[i]='X';A.click();turn='O';render();
    if(!over&&aiMode){setTimeout(()=>{aiMove();turn='X';render()},200)}
  }
  $('#ttt-r').onclick=reset;reset();
  return()=>{ct.innerHTML=''};
}

// 🐔 CROSSY ROAD
// ════════════════════════════════════════════════
function gCrossy(ct){
  const{canvas:c,ctx,W,H,kill}=makeCanvas(ct);
  titleScreen(ct,'Crossy Road','Swipe or arrow keys · Don\'t get hit!',()=>{});
  let player,sc,dead,loop,lanes,cam;
  const TILE=36;
  function makeLane(y,type){
    if(type==='road'){
      const spd=(1+Math.random()*2)*(Math.random()>.5?1:-1);
      const gap=120+Math.random()*80;
      const cars=[];
      for(let x=-200;x<800;x+=gap){cars.push({x,w:30+Math.random()*30,color:`hsl(${Math.random()*360},65%,50%)`})}
      return{y,type,spd,cars};
    }
    if(type==='river'){
      const spd=(.8+Math.random()*1.5)*(Math.random()>.5?1:-1);
      const gap=100+Math.random()*60;
      const logs=[];
      for(let x=-200;x<800;x+=gap){logs.push({x,w:50+Math.random()*40})}
      return{y,type,spd,logs};
    }
    return{y,type};
  }
  function genLanes(){
    lanes=[makeLane(0,'grass')];
    for(let i=1;i<80;i++){
      const r=Math.random();
      if(r<.45)lanes.push(makeLane(-i,'road'));
      else if(r<.7)lanes.push(makeLane(-i,'river'));
      else lanes.push(makeLane(-i,'grass'));
    }
  }
  function reset(){
    player={lx:0,ly:0,tx:W()/2,ty:0,moving:false};sc=0;dead=false;cam=0;
    genLanes();score('0');ct.querySelector('.overlay')?.remove();
  }
  function hop(dx,dy){
    if(dead||player.moving)return;
    player.lx+=dx;player.ly+=dy;
    player.moving=true;A.click();
    if(dy<0){sc++;score(sc);cam=Math.min(cam,player.ly*TILE+H()*.35)}
    setTimeout(()=>{player.moving=false},100);
  }
  function getLane(ly){return lanes.find(l=>l.y===ly)}
  function update(){
    if(dead)return;
    // update lanes
    lanes.forEach(l=>{
      if(l.type==='road')l.cars.forEach(car=>{car.x+=l.spd;if(l.spd>0&&car.x>W()+100)car.x=-200;if(l.spd<0&&car.x<-200)car.x=W()+100});
      if(l.type==='river')l.logs.forEach(log=>{log.x+=l.spd;if(l.spd>0&&log.x>W()+100)log.x=-200;if(l.spd<0&&log.x<-200)log.x=W()+100});
    });
    // collision
    const px=player.lx*TILE+W()/2,py=player.ly*TILE;
    const lane=getLane(player.ly);
    if(lane){
      if(lane.type==='road'){
        for(const car of lane.cars){if(px+8>car.x&&px-8<car.x+car.w){die();return}}
      }
      if(lane.type==='river'){
        let onLog=false;
        for(const log of lane.logs){if(px+8>log.x&&px-8<log.x+log.w){onLog=true;player.lx+=lane.spd/TILE;break}}
        if(!onLog){die();return}
      }
    }
    // smoothly follow cam
    cam+=(player.ly*TILE-H()*.35-cam)*.1;
  }
  function die(){dead=true;A.lose();showOver()}
  function draw(){
    update();const w=W(),h=H();
    ctx.fillStyle='#06080f';ctx.fillRect(0,0,w,h);
    // draw lanes
    lanes.forEach(l=>{
      const sy=l.y*TILE-cam;if(sy<-TILE*2||sy>h+TILE)return;
      // background
      if(l.type==='grass'){ctx.fillStyle=l.y%2===0?'#2d5a27':'#357a2e';ctx.fillRect(0,sy,w,TILE)}
      else if(l.type==='road'){ctx.fillStyle='#333';ctx.fillRect(0,sy,w,TILE);ctx.strokeStyle='#555';ctx.setLineDash([8,8]);ctx.beginPath();ctx.moveTo(0,sy+TILE/2);ctx.lineTo(w,sy+TILE/2);ctx.stroke();ctx.setLineDash([])}
      else if(l.type==='river'){ctx.fillStyle='#1a4a7a';ctx.fillRect(0,sy,w,TILE)}
      // objects
      if(l.type==='road'){l.cars.forEach(car=>{ctx.fillStyle=car.color;ctx.beginPath();ctx.roundRect(car.x,sy+4,car.w,TILE-8,4);ctx.fill()})}
      if(l.type==='river'){l.logs.forEach(log=>{ctx.fillStyle='#8B5E3C';ctx.beginPath();ctx.roundRect(log.x,sy+6,log.w,TILE-12,6);ctx.fill();ctx.fillStyle='#6B4226';ctx.beginPath();ctx.roundRect(log.x+4,sy+10,log.w-8,TILE-20,3);ctx.fill()})}
    });
    // player (chicken)
    const px=player.lx*TILE+w/2,py=player.ly*TILE-cam;
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(px,py+TILE/2-2,TILE*.35,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.arc(px+6,py+TILE/2-8,3,0,Math.PI*2);ctx.fill();// beak
    ctx.fillStyle='#f87171';ctx.fillRect(px-2,py+TILE/2-16,4,6);// comb
    ctx.fillStyle='#000';ctx.beginPath();ctx.arc(px+4,py+TILE/2-6,2,0,Math.PI*2);ctx.fill();// eye
    // score
    ctx.fillStyle='rgba(0,0,0,.5)';ctx.beginPath();ctx.roundRect(w/2-30,8,60,32,8);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='bold 18px JetBrains Mono';ctx.textAlign='center';ctx.fillText(sc,w/2,30);
    loop=requestAnimationFrame(draw);
  }
  function showOver(){const d=document.createElement('div');d.className='overlay';d.innerHTML=`<h2>Splat!</h2><div class="sub">${sc} hops</div><button class="btn">Try Again</button>`;d.querySelector('button').onclick=reset;ct.appendChild(d)}
  function onKey(e){
    if(e.key==='ArrowUp'||e.key==='w'){hop(0,-1);e.preventDefault()}
    else if(e.key==='ArrowDown'||e.key==='s'){hop(0,1);e.preventDefault()}
    else if(e.key==='ArrowLeft'||e.key==='a'){hop(-1,0);e.preventDefault()}
    else if(e.key==='ArrowRight'||e.key==='d'){hop(1,0);e.preventDefault()}
  }
  swipe(c,d=>{if(d==='up')hop(0,-1);else if(d==='down')hop(0,1);else if(d==='left')hop(-1,0);else hop(1,0)});
  addDpad(ct,d=>{if(d==='up')hop(0,-1);else if(d==='down')hop(0,1);else if(d==='left')hop(-1,0);else hop(1,0)});
  c.addEventListener('click',e=>{
    if(dead)return;
    const r=c.getBoundingClientRect(),y=(e.clientY-r.top)/r.height;
    if(y<.4)hop(0,-1);else if(y>.6)hop(0,1);
  });
  document.addEventListener('keydown',onKey);reset();loop=requestAnimationFrame(draw);
  return()=>{cancelAnimationFrame(loop);document.removeEventListener('keydown',onKey);kill()};
}

// ♟️ CHESS
// ════════════════════════════════════════════════
function gChess(ct){
  const PIECES={K:'♔',Q:'♕',R:'♖',B:'♗',N:'♘',P:'♙',k:'♚',q:'♛',r:'♜',b:'♝',n:'♞',p:'♟'};
  const VALS={p:100,n:320,b:330,r:500,q:900,k:0};
  let board,turn,selected,legalMoves,lastMove,gameOver,difficulty=1,castleRights,enPassant;
  const START_FEN='rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR';
  const el=document.createElement('div');el.className='chess-wrap';
  el.innerHTML=`<div class="hud" style="width:100%;max-width:396px"><span id="ch-s">Your turn</span><button class="btn btn-sm btn-ghost" id="ch-r">New</button></div>
  <div class="chess-diff" id="ch-diff"><button class="on" data-d="0">Easy</button><button data-d="1">Medium</button><button data-d="2">Hard</button></div>
  <div class="chess-board" id="ch-b"></div><div class="chess-info" id="ch-i"></div>`;
  ct.appendChild(el);
  el.querySelectorAll('.chess-diff button').forEach(b=>{
    b.onclick=()=>{difficulty=+b.dataset.d;el.querySelectorAll('.chess-diff button').forEach(x=>x.classList.remove('on'));b.classList.add('on');reset()};
  });

  function parseFEN(fen){const b=Array(64).fill('');let i=0;for(const ch of fen){if(ch==='/');else if(ch>='1'&&ch<='8')i+=+ch;else{b[i]=ch;i++}}return b}
  function isW(p){return p&&p===p.toUpperCase()}
  function isB(p){return p&&p===p.toLowerCase()}
  function ok(r,c){return r>=0&&r<8&&c>=0&&c<8}
  function I(r,c){return r*8+c}
  function RC(i){return[i>>3,i&7]}

  function getMoves(b,i,filterCheck=true){
    const[r,c]=RC(i);const p=b[i];if(!p)return[];
    const mv=[];const w=isW(p);const t=p.toLowerCase();
    const friend=w?isW:isB;const enemy=w?isB:isW;
    if(t==='p'){
      const dir=w?-1:1,start=w?6:1;
      const fwd=I(r+dir,c);
      if(ok(r+dir,c)&&!b[fwd]){mv.push(fwd);if(r===start&&!b[I(r+2*dir,c)])mv.push(I(r+2*dir,c))}
      for(const dc of[-1,1]){if(!ok(r+dir,c+dc))continue;const ti=I(r+dir,c+dc);
        if(b[ti]&&enemy(b[ti]))mv.push(ti);
        else if(ti===enPassant)mv.push(ti);// en passant capture
      }
    }
    if(t==='n'){for(const[dr,dc]of[[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]]){if(!ok(r+dr,c+dc))continue;const ti=I(r+dr,c+dc);if(!b[ti]||enemy(b[ti]))mv.push(ti)}}
    const slides=[];
    if(t==='b'||t==='q')slides.push([-1,-1],[-1,1],[1,-1],[1,1]);
    if(t==='r'||t==='q')slides.push([-1,0],[1,0],[0,-1],[0,1]);
    for(const[dr,dc]of slides){for(let s=1;s<8;s++){const nr=r+dr*s,nc=c+dc*s;if(!ok(nr,nc))break;const ti=I(nr,nc);if(!b[ti])mv.push(ti);else{if(enemy(b[ti]))mv.push(ti);break}}}
    if(t==='k'){
      for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){if(!dr&&!dc)continue;if(!ok(r+dr,c+dc))continue;const ti=I(r+dr,c+dc);if(!b[ti]||enemy(b[ti]))mv.push(ti)}
      // castling
      if(filterCheck&&!inCheck(b,w)){
        const row=w?7:0;const cr=w?castleRights.w:castleRights.b;
        if(cr.k&&b[I(row,5)]===''&&b[I(row,6)]===''&&!attacked(b,I(row,5),!w))mv.push(I(row,6));
        if(cr.q&&b[I(row,3)]===''&&b[I(row,2)]===''&&b[I(row,1)]===''&&!attacked(b,I(row,3),!w))mv.push(I(row,2));
      }
    }
    if(filterCheck)return mv.filter(m=>{const nb=[...b];nb[m]=nb[i];nb[i]='';return!inCheck(nb,w)});
    return mv;
  }
  function findKing(b,w){for(let i=0;i<64;i++)if(b[i]===(w?'K':'k'))return i;return-1}
  function attacked(b,sq,byWhite){
    for(let i=0;i<64;i++){if(!b[i])continue;if(byWhite?isW(b[i]):isB(b[i])){if(getMoves(b,i,false).includes(sq))return true}}return false;
  }
  function inCheck(b,white){const ki=findKing(b,white);return ki<0||attacked(b,ki,!white)}
  function allMoves(b,white){
    const mv=[];for(let i=0;i<64;i++){if(!b[i])continue;if(white?isW(b[i]):isB(b[i])){getMoves(b,i).forEach(to=>mv.push({from:i,to}))}}return mv;
  }
  // Full piece-square tables from XS Chess
  const PST={
    p:[0,0,0,0,0,0,0,0, 50,50,50,50,50,50,50,50, 10,10,20,30,30,20,10,10, 5,5,10,25,25,10,5,5, 0,0,0,20,20,0,0,0, 5,-5,-10,0,0,-10,-5,5, 5,10,10,-20,-20,10,10,5, 0,0,0,0,0,0,0,0],
    n:[-50,-40,-30,-30,-30,-30,-40,-50, -40,-20,0,0,0,0,-20,-40, -30,0,10,15,15,10,0,-30, -30,5,15,20,20,15,5,-30, -30,0,15,20,20,15,0,-30, -30,5,10,15,15,10,5,-30, -40,-20,0,5,5,0,-20,-40, -50,-40,-30,-30,-30,-30,-40,-50],
    b:[-20,-10,-10,-10,-10,-10,-10,-20, -10,0,0,0,0,0,0,-10, -10,0,10,10,10,10,0,-10, -10,5,5,10,10,5,5,-10, -10,0,10,10,10,10,0,-10, -10,10,10,10,10,10,10,-10, -10,5,0,0,0,0,5,-10, -20,-10,-10,-10,-10,-10,-10,-20],
    r:[0,0,0,0,0,0,0,0, 5,10,10,10,10,10,10,5, -5,0,0,0,0,0,0,-5, -5,0,0,0,0,0,0,-5, -5,0,0,0,0,0,0,-5, -5,0,0,0,0,0,0,-5, -5,0,0,0,0,0,0,-5, 0,0,0,5,5,0,0,0],
    q:[-20,-10,-10,-5,-5,-10,-10,-20, -10,0,0,0,0,0,0,-10, -10,0,5,5,5,5,0,-10, -5,0,5,5,5,5,0,-5, 0,0,5,5,5,5,0,-5, -10,5,5,5,5,5,0,-10, -10,0,5,0,0,0,0,-10, -20,-10,-10,-5,-5,-10,-10,-20],
    k:[-30,-40,-40,-50,-50,-40,-40,-30, -30,-40,-40,-50,-50,-40,-40,-30, -30,-40,-40,-50,-50,-40,-40,-30, -30,-40,-40,-50,-50,-40,-40,-30, -20,-30,-30,-40,-40,-30,-30,-20, -10,-20,-20,-20,-20,-20,-20,-10, 20,20,0,0,0,0,20,20, 20,30,10,0,0,10,30,20]
  };
  function evaluate(b){
    let s=0;
    for(let i=0;i<64;i++){
      const p=b[i];if(!p)continue;const t=p.toLowerCase();const v=VALS[t]||0;
      const tbl=PST[t];
      // XS Chess PST lookup: white uses flipped index (7-r)*8+c, black uses direct index
      const r=i>>3,c=i&7;
      const pstVal=tbl?(isW(p)?tbl[(7-r)*8+c]:tbl[i]):0;
      if(isW(p))s+=v+pstVal;else s-=v+pstVal;
    }
    // Mobility bonus: +2 per legal move (matches XS Chess)
    s+=allMoves(b,true).length*2;s-=allMoves(b,false).length*2;
    return s;
  }
  // Minimax with alpha-beta pruning + capture-first ordering (from XS Chess)
  function minimax(b,depth,alpha,beta,isMaximizing){
    if(depth===0)return evaluate(b);
    const mv=allMoves(b,isMaximizing);
    if(!mv.length)return inCheck(b,isMaximizing)?(isMaximizing?-99999:99999):0;
    // Move ordering: captures first for better pruning (XS Chess optimization)
    mv.sort((a,c)=>(b[c.to]?1:0)-(b[a.to]?1:0));
    if(isMaximizing){
      let maxEval=-Infinity;
      for(const m of mv){const nb=[...b];applyMove(nb,m);const ev=minimax(nb,depth-1,alpha,beta,false);maxEval=Math.max(maxEval,ev);alpha=Math.max(alpha,ev);if(beta<=alpha)break}
      return maxEval;
    }else{
      let minEval=Infinity;
      for(const m of mv){const nb=[...b];applyMove(nb,m);const ev=minimax(nb,depth-1,alpha,beta,true);minEval=Math.min(minEval,ev);beta=Math.min(beta,ev);if(beta<=alpha)break}
      return minEval;
    }
  }
  function applyMove(b,m){
    const p=b[m.from];const t=p.toLowerCase();
    // castling
    if(t==='k'&&Math.abs((m.to&7)-(m.from&7))===2){
      const row=m.from>>3;if((m.to&7)===6){b[I(row,5)]=b[I(row,7)];b[I(row,7)]=''}
      else{b[I(row,3)]=b[I(row,0)];b[I(row,0)]=''}
    }
    // en passant capture
    if(t==='p'&&m.to===enPassant){
      const capturedRow=isW(p)?((m.to>>3)+1):((m.to>>3)-1);
      b[I(capturedRow,m.to&7)]='';
    }
    // promotion
    if(t==='p'&&(m.to>>3===0))b[m.to]='Q';
    else if(t==='p'&&(m.to>>3===7))b[m.to]='q';
    else b[m.to]=p;
    b[m.from]='';
  }
  function aiMove(){
    const mv=allMoves(board,false);if(!mv.length)return;
    let bestMove;
    if(difficulty===0){
      // Easy: pure random (XS Chess easy mode)
      bestMove=mv[Math.random()*mv.length|0];
    }else if(difficulty===1){
      // Medium: prefer captures, then checks, then random (XS Chess medium mode)
      const captures=mv.filter(m=>board[m.to]&&isW(board[m.to]));
      const checks=mv.filter(m=>{const nb=[...board];applyMove(nb,m);return inCheck(nb,true)});
      if(captures.length)bestMove=captures[Math.random()*captures.length|0];
      else if(checks.length)bestMove=checks[Math.random()*checks.length|0];
      else bestMove=mv[Math.random()*mv.length|0];
    }else{
      // Hard: minimax depth 3 with alpha-beta + capture ordering + jitter (XS Chess hard mode)
      const sorted=[...mv];sorted.sort((a,c)=>(board[c.to]?1:0)-(board[a.to]?1:0));
      let bestS=-Infinity;let bestMoves=[];
      for(const m of sorted){
        const nb=[...board];applyMove(nb,m);
        const s=minimax(nb,2,-Infinity,Infinity,false)+Math.random()*5;
        if(s>bestS){bestS=s;bestMoves=[m]}
        else if(Math.abs(s-bestS)<1)bestMoves.push(m);
      }
      bestMove=bestMoves[Math.random()*bestMoves.length|0];
    }
    const aiPiece=board[bestMove.from];
    applyMove(board,bestMove);updateCastle(bestMove);
    // en passant tracking for AI
    if(aiPiece&&aiPiece.toLowerCase()==='p'&&Math.abs((bestMove.to>>3)-(bestMove.from>>3))===2){
      enPassant=I(((bestMove.from>>3)+(bestMove.to>>3))>>1,bestMove.from&7);
    }else enPassant=-1;
    lastMove=[bestMove.from,bestMove.to];A.click();
    turn='w';checkEnd();render();
    // board shake on check (XS Chess feature)
    if(inCheck(board,true)){const brd=$('#ch-b');brd.style.animation='shake .4s ease-out';setTimeout(()=>brd.style.animation='',400)}
  }
  function updateCastle(m){
    if(board[m.to]==='K'||m.from===60)castleRights.w={k:false,q:false};
    if(board[m.to]==='k'||m.from===4)castleRights.b={k:false,q:false};
    if(m.from===63||m.to===63)castleRights.w.k=false;
    if(m.from===56||m.to===56)castleRights.w.q=false;
    if(m.from===7||m.to===7)castleRights.b.k=false;
    if(m.from===0||m.to===0)castleRights.b.q=false;
  }
  function doMove(from,to){
    const m={from,to};const piece=board[from];
    applyMove(board,m);updateCastle(m);
    // set en passant target if pawn moved 2 squares
    if(piece&&piece.toLowerCase()==='p'&&Math.abs((to>>3)-(from>>3))===2){
      enPassant=I(((from>>3)+(to>>3))>>1,from&7);
    }else enPassant=-1;
    lastMove=[from,to];turn='b';A.click();checkEnd();render();
    // board shake on check (XS Chess feature)
    if(inCheck(board,false)){const brd=$('#ch-b');brd.style.animation='shake .4s ease-out';setTimeout(()=>brd.style.animation='',400)}
    if(!gameOver)setTimeout(aiMove,300);
  }
  function checkEnd(){
    const w=turn==='w';const mv=allMoves(board,w);
    if(!mv.length){
      gameOver=true;
      if(inCheck(board,w)){$('#ch-i').textContent=w?'Checkmate! AI wins.':'Checkmate! You win!';score(w?'Loss':'Win!');w?A.lose():A.win()}
      else{$('#ch-i').textContent='Stalemate — Draw!';score('Draw')}
    }else if(inCheck(board,w)){
      $('#ch-i').textContent=(w?'White':'Black')+' is in CHECK!';
      if(w)A.t(200,.15,'square',.1);
    }else{$('#ch-i').textContent=''}
    $('#ch-s').textContent=gameOver?'Game Over':turn==='w'?'Your turn (White)':'AI thinking...';
  }
  function render(){
    const g=$('#ch-b');g.innerHTML='';selected=null;legalMoves=[];
    for(let i=0;i<64;i++){
      const[r,c]=RC(i);const sq=document.createElement('div');
      sq.className='chess-sq '+((r+c)%2===0?'light':'dark');
      if(lastMove&&lastMove.includes(i))sq.classList.add('last');
      if(board[i]){sq.textContent=PIECES[board[i]];sq.classList.add(isW(board[i])?'wpc':'bpc')}
      if(board[i]==='K'&&inCheck(board,true))sq.classList.add('check');
      if(board[i]==='k'&&inCheck(board,false))sq.classList.add('check');
      sq.onclick=()=>clickSq(i);
      g.appendChild(sq);
    }
  }
  function clickSq(i){
    if(gameOver||turn!=='w')return;

}

// 📀 DVD BOUNCE
// ════════════════════════════════════════════════
function wDVD(ct){
  const{canvas:c,ctx,W,H,kill}=makeCanvas(ct);
  let x=100,y=100,dx=2.5,dy=2,hue=0,corners=0,loop;
  const tw=120,th=55;
  function draw(){
    ctx.fillStyle='rgba(6,8,15,.15)';ctx.fillRect(0,0,W(),H());
    x+=dx;y+=dy;let hit=false;
    if(x<=0||x+tw>=W()){dx*=-1;hue=(hue+60)%360;hit=true}
    if(y<=0||y+th>=H()){dy*=-1;hue=(hue+60)%360;hit=true}
    // corner check!
    if((x<=2||x+tw>=W()-2)&&(y<=2||y+th>=H()-2)){corners++;A.win()}
    else if(hit)A.click();
    // DVD logo
    ctx.fillStyle=`hsl(${hue},80%,55%)`;ctx.font='bold 40px Outfit';ctx.textAlign='center';
    ctx.shadowColor=`hsl(${hue},80%,55%)`;ctx.shadowBlur=20;
    ctx.fillText('DVD',x+tw/2,y+th/2+14);ctx.shadowBlur=0;
    // corner counter
    ctx.fillStyle='#6b7a94';ctx.font='14px Outfit';ctx.textAlign='center';
    ctx.fillText(`Corner hits: ${corners}`,W()/2,H()-20);
    if(corners>0){ctx.fillStyle='#fbbf24';ctx.font='bold 16px Outfit';ctx.fillText('🎉 CORNER HIT! 🎉',W()/2,H()-44)}
    loop=requestAnimationFrame(draw);
  }
  draw();return()=>{cancelAnimationFrame(loop);kill()};
}
